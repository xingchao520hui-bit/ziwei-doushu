<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命理师对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0d0d1a;color:#d4c5a9;min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse at 20% 50%,rgba(233,69,96,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(120,80,200,0.05) 0%,transparent 50%)}
.header{background:linear-gradient(180deg,#1a0a2e,#0d0d1a);padding:28px 20px 20px;text-align:center;border-bottom:1px solid rgba(233,69,96,0.3);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(233,69,96,0.8),transparent)}
.header h1{font-size:24px;color:#e94560;letter-spacing:4px;text-shadow:0 0 30px rgba(233,69,96,0.4);font-weight:normal}
.header .sub{color:#8a7a6a;font-size:12px;margin-top:6px;letter-spacing:2px}
.header .decor{color:#e94560;font-size:18px;margin:0 8px}
/* 输入面板 */
.input-panel{background:rgba(26,26,46,0.9);border-radius:8px;margin:20px auto;padding:20px;max-width:680px;width:92%;border:1px solid rgba(233,69,96,0.15)}
.input-title{color:#e94560;font-size:14px;margin-bottom:12px;text-align:center;letter-spacing:2px}
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.input-group label{display:block;color:#8a7a6a;font-size:11px;margin-bottom:3px;letter-spacing:1px}
.input-group input,.input-group select{background:rgba(13,13,26,0.8);color:#d4c5a9;border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:7px 10px;font-size:13px;width:100%;transition:border 0.3s}
.input-group input:focus,.input-group select:focus{border-color:rgba(233,69,96,0.5);outline:none}
.btn-row{margin-top:14px;text-align:center}
.btn-start{background:linear-gradient(135deg,rgba(233,69,96,0.9),rgba(199,54,89,0.9));color:#fff;border:none;padding:9px 32px;border-radius:4px;font-size:14px;cursor:pointer;letter-spacing:2px;transition:all 0.3s}
.btn-start:hover{box-shadow:0 0 20px rgba(233,69,96,0.4)}
.btn-start:disabled{opacity:0.4;cursor:not-allowed}
.status{text-align:center;margin-top:8px;font-size:12px;color:#8a7a6a;min-height:18px}
/* 聊天区 */
.chat-wrapper{display:none;flex-direction:column;flex:1;max-width:860px;margin:0 auto;width:100%}
.chat-wrapper.show{display:flex}
.info-bar{background:rgba(26,26,46,0.9);margin:12px 16px 0;padding:10px 16px;border-radius:4px;border-left:2px solid rgba(233,69,96,0.6);font-size:12px;color:#8a7a6a;display:flex;justify-content:space-between;align-items:center}
.info-bar .name{color:#e94560}
.chat-area{flex:1;padding:16px 16px 10px;overflow-y:auto;min-height:350px}
.chat-messages{display:flex;flex-direction:column;gap:18px}
.msg{max-width:88%;padding:14px 18px;border-radius:4px;line-height:1.9;font-size:14px;position:relative;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;background:rgba(26,26,46,0.95);border:1px solid rgba(233,69,96,0.12);border-left:3px solid rgba(233,69,96,0.5)}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,rgba(233,69,96,0.15),rgba(199,54,89,0.1));border:1px solid rgba(233,69,96,0.3);color:#e8d5c5}
.msg .master-mark{font-size:11px;color:rgba(233,69,96,0.7);margin-bottom:6px;letter-spacing:2px;border-bottom:1px solid rgba(233,69,96,0.1);padding-bottom:5px}
.msg.bot .master-mark::before{content:"☯ "}
.msg h3{color:#e94560;font-size:15px;margin:8px 0 4px;font-weight:normal;letter-spacing:1px}
.msg h4{color:#c9a96e;font-size:13px;margin:6px 0 3px;font-weight:normal}
.msg p{margin:4px 0}
.msg strong{color:#c9a96e}
.msg .lucky{color:#50fa7b}
.msg .evil{color:#ff5555}
.msg .dim{color:#6a5a4a;font-size:12px;font-style:italic}
.msg .divider{height:1px;background:rgba(233,69,96,0.1);margin:10px 0}
.msg .seal{text-align:right;color:rgba(233,69,96,0.4);font-size:11px;margin-top:8px;letter-spacing:2px}
/* 快捷栏 */
.quick-bar{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;border-top:1px solid rgba(255,255,255,0.04)}
.quick-btn{background:rgba(26,26,46,0.9);border:1px solid rgba(255,255,255,0.06);color:#8a7a6a;padding:5px 14px;border-radius:3px;font-size:11px;cursor:pointer;transition:all 0.3s;letter-spacing:1px}
.quick-btn:hover{border-color:rgba(233,69,96,0.4);color:#e94560}
/* 输入栏 */
.input-bar{padding:12px 16px;background:rgba(26,26,46,0.95);border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:10px;align-items:center}
.input-bar input{flex:1;background:rgba(13,13,26,0.9);color:#d4c5a9;border:1px solid rgba(255,255,255,0.06);border-radius:3px;padding:9px 16px;font-size:13px;outline:none;transition:border 0.3s}
.input-bar input:focus{border-color:rgba(233,69,96,0.4)}
.input-bar button{background:rgba(233,69,96,0.8);color:#fff;border:none;padding:9px 20px;border-radius:3px;cursor:pointer;font-size:13px;letter-spacing:1px;transition:all 0.3s}
.input-bar button:hover{background:rgba(233,69,96,1)}
.typing{color:rgba(233,69,96,0.5);font-size:12px;padding:8px 18px;font-style:italic;letter-spacing:1px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(233,69,96,0.2);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <h1>紫微斗数 · 命理师对话</h1>
  <div class="sub">观天之道 · 执天之行<span class="decor">☯</span>知命改运 · 趋吉避凶</div>
</div>

<!-- 输入面板 -->
<div class="input-panel" id="inputPanel">
  <div class="input-title">— 请报上生辰八字 —</div>
  <div class="input-grid">
    <div class="input-group"><label>出生年</label><input type="number" id="inYear" min="1900" max="2100" placeholder="如 1999"></div>
    <div class="input-group"><label>月</label><input type="number" id="inMonth" min="1" max="12" placeholder="如 2"></div>
    <div class="input-group"><label>日</label><input type="number" id="inDay" min="1" max="31" placeholder="如 17"></div>
    <div class="input-group"><label>时辰（0-23）</label><input type="number" id="inHour" min="0" max="23" placeholder="如 22"></div>
    <div class="input-group"><label>性别</label>
      <select id="inGender"><option value="male">乾造（男）</option><option value="female">坤造（女）</option></select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-start" id="btnStart" onclick="doChart()">排盘论命</button>
  </div>
  <div class="status" id="statusText"></div>
</div>

<!-- 聊天区 -->
<div class="chat-wrapper" id="chatWrapper">
  <div class="info-bar">
    <span id="infoText"></span>
    <span style="font-size:11px;color:rgba(233,69,96,0.5)">命理师在线</span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-messages" id="chatMessages"></div>
  </div>
  <div class="quick-bar" id="quickBar"></div>
  <div class="input-bar">
    <input type="text" id="chatInput" placeholder="请赐问..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">赐教</button>
  </div>
</div>

<script>
const API = window.location.port==='3211'?'':'http://localhost:3211';
let chartData=null, currentYear=new Date().getFullYear();

// ── 排盘 ──
async function doChart(){
  const y=parseInt(document.getElementById('inYear').value);
  const m=parseInt(document.getElementById('inMonth').value);
  const d=parseInt(document.getElementById('inDay').value);
  const h=parseInt(document.getElementById('inHour').value);
  const g=document.getElementById('inGender').value;
  if(!y||!m||!d||isNaN(h)){setStatus('请填入完整生辰');return;}
  setStatus('正在排盘，请稍候...');
  document.getElementById('btnStart').disabled=true;
  try{
    const r=await fetch(API+'/chart?year='+y+'&month='+m+'&day='+d+'&hour='+h+'&gender='+g);
    if(!r.ok)throw new Error('排盘失败');
    const data=await r.json();
    if(data.error)throw new Error(data.error);
    chartData=data;
    try{
      const pr=await fetch(API+'/past-years?year='+y+'&month='+m+'&day='+d+'&hour='+h+'&gender='+g);
      if(pr.ok)chartData.pastYears=(await pr.json()).years;
    }catch(e){}
    enterChat();
  }catch(e){setStatus('排盘出错：'+e.message);document.getElementById('btnStart').disabled=false;}
}

function enterChat(){
  document.getElementById('inputPanel').style.display='none';
  document.getElementById('chatWrapper').classList.add('show');
  const d=chartData;
  const genderTxt=d.birth.gender==='male'?'乾造':'坤造';
  document.getElementById('infoText').innerHTML=
    genderTxt+' · '+d.birth.year+'年'+d.birth.month+'月'+d.birth.day+'日 '+d.birth.hour+'时 · 命主<strong>'+d.info.mingZhu+'</strong> · '+d.info.wuxingJu;
  // 快捷按钮
  document.getElementById('quickBar').innerHTML=
    '<button class="quick-btn" onclick="ask(\'今年运势如何\')">流年运势</button>'+
    '<button class="quick-btn" onclick="ask(\'事业前程\')">事业前程</button>'+
    '<button class="quick-btn" onclick="ask(\'财运析评\')">财运析评</button>'+
    '<button class="quick-btn" onclick="ask(\'姻缘感情\')">姻缘感情</button>'+
    '<button class="quick-btn" onclick="ask(\'健康状况\')">健康状况</button>'+
    '<button class="quick-btn" onclick="ask(\'性格命格\')">性格命格</button>'+
    '<button class="quick-btn" onclick="ask(\'贵人方位\')">贵人方位</button>'+
    '<button class="quick-btn" onclick="ask(\'人生大运\')">人生大运</button>'+
    '<button class="quick-btn" onclick="ask(\'命盘格局\')">命盘格局</button>'+
    '<button class="quick-btn" onclick="ask(\'改运之法\')">改运之法</button>';
  // 开场白
  addBotMsg(renderWelcome());
  scrollBottom();
}

function renderWelcome(){
  const d=chartData;
  const ming=pn(d,'命宫');
  const mingStar=ms(ming).map(s=>s.name+'['+(s.brightness||'平')+']'+(s.siHua?'化'+hn(s.siHua):'')).join('、')||'空宫借对宫';
  let txt='<div class="master-mark">命理师谨按</div>';
  txt+='<p>善信慈悲，贫道已为您排定命盘。</p>';
  txt+='<div class="divider"></div>';
  txt+='<h3>☯ 命盘总览</h3>';
  txt+='<p>命宫：'+mingStar+'</p>';
  txt+='<p>五行局：'+d.info.wuxingJu+'　命主：'+d.info.mingZhu+'　身主：'+d.info.shenZhu+'</p>';
  if(d.currentAge)txt+='<p>虚岁：'+d.currentAge+'　当前大限：'+getCurrentDaXian()+'</p>';
  txt+='<div class="divider"></div>';
  txt+='<p class="dim">命盘已定，然运可改、数可易。善信有何疑问，尽管赐问。贫道当以紫微秘法，为您详解。</p>';
  txt+='<div class="seal">— 紫微命理 —</div>';
  return txt;
}

// ── 对话引擎 ──
function ask(q){sendMsg(q)}
function sendMsg(q){
  const input=document.getElementById('chatInput');
  const text=q||input.value.trim();
  if(!text)return;
  input.value='';
  addUserMsg(text);
  showTyping();
  const delay=600+Math.random()*800;
  setTimeout(()=>{
    hideTyping();
    const answer=generateMasterAnswer(text);
    addBotMsg(answer);
    scrollBottom();
  },delay);
}

function addUserMsg(text){
  const div=document.createElement('div');
  div.className='msg user';
  div.textContent=text;
  document.getElementById('chatMessages').appendChild(div);
  scrollBottom();
}
function addBotMsg(html){
  const div=document.createElement('div');
  div.className='msg bot';
  div.innerHTML=html;
  document.getElementById('chatMessages').appendChild(div);
  scrollBottom();
}
function showTyping(){
  hideTyping();
  const d=document.createElement('div');
  d.className='typing';d.id='typingIndicator';
  d.textContent='命理师正在推演命盘...';
  document.getElementById('chatMessages').appendChild(d);
  scrollBottom();
}
function hideTyping(){const e=document.getElementById('typingIndicator');if(e)e.remove();}
function scrollBottom(){const a=document.getElementById('chatArea');setTimeout(()=>a.scrollTop=a.scrollHeight,80);}
function setStatus(t){document.getElementById('statusText').textContent=t;}

// ── 核心：命理师风格回答生成 ──
function generateMasterAnswer(question){
  const q=question.toLowerCase().trim();
  const d=chartData;
  if(!d)return '请先排盘';
  
  // 流年
  const yearMatch=q.match(/(20\d{2}|19\d{2})/);
  const askYear=yearMatch?parseInt(yearMatch[1]):null;
  if(q.includes('今年')||q.includes('本年')||q.includes('当年'))return answerYearMaster(currentYear);
  if(q.includes('明年'))return answerYearMaster(currentYear+1);
  if(askYear&&(q.includes('年')||q.includes('运势')||q.includes('运')))return answerYearMaster(askYear);
  
  // 分类
  if(q.includes('事业')||q.includes('工作')||q.includes('前程')||q.includes('职业')||q.includes('行业'))return answerCareerMaster();
  if(q.includes('财')||q.includes('钱')||q.includes('收入')||q.includes('财富'))return answerWealthMaster();
  if(q.includes('感情')||q.includes('婚')||q.includes('姻缘')||q.includes('桃花')||q.includes('对象')||q.includes('另一半'))return answerLoveMaster();
  if(q.includes('健康')||q.includes('身体')||q.includes('病')||q.includes('疾'))return answerHealthMaster();
  if(q.includes('性格')||q.includes('命格')||q.includes('为人')||q.includes('命宫'))return answerPersonalityMaster();
  if(q.includes('贵人')||q.includes('方位')||q.includes('帮助'))return answerNobleMaster();
  if(q.includes('格局')||q.includes('命局'))return answerPatternMaster();
  if(q.includes('改运')||q.includes('化解')||q.includes('建议')||q.includes('人生'))return answerAdviceMaster();
  if(q.includes('大运')||q.includes('大限'))return answerDaXianMaster();
  
  // 默认
  return answerDefaultMaster(question);
}

// ── 流年分析（命理师风格）──
function answerYearMaster(year){
  const d=chartData;
  const yData=d.pastYears?d.pastYears.find(y=>y.year===year):null;
  let txt='<div class="master-mark">'+year+'年流年批命</div>';
  
  if(!yData){
    txt+='<p>此年不在推算范围内，或生辰信息有误。请确认。</p>';
    return txt;
  }
  
  const xusui=year-d.birth.year;
  txt+='<p><strong>'+year+'年</strong>（虚岁 '+xusui+'）</p>';
  txt+='<div class="divider"></div>';
  
  // 四化引动
  if(yData.sihua&&yData.sihua.length>0){
    txt+='<h4>☯ 四化引动</h4>';
    yData.sihua.forEach(s=>{
      if(!s.palace)return;
      const palaceName=s.palace;
      const starName=s.star||'';
      const fly=s.fly||'';
      let effect='';
      if(fly==='lu')effect='<span class="lucky">禄气加身，此宫大吉。财禄、机遇皆旺，宜把握。</span>';
      else if(fly==='quan')effect='权星入宫，掌控力增强，主动权在握，可积极主动。';
      else if(fly==='ke')effect='科星照耀，名声、才华得以展现，人缘转佳，宜考试、交际。';
      else if(fly==='ji')effect='<span class="evil">忌星入宫，能量阻塞，此宫之事需格外谨慎，不可冒进。</span>';
      txt+='<p>'+palaceName+'宫：'+starName+(fly?' 化'+hn(fly):'')+'——'+effect+'</p>';
    });
    txt+='<div class="divider"></div>';
  }
  
  // 流年命宫
  if(yData.palace){
    txt+='<h4>☯ 流年命宫</h4>';
    txt+='<p>流年命宫在<strong>'+yData.palace.name+'</strong>宫（'+yData.palace.branch+'地）</p>';
    const orig=d.palaces.find(p=>p.branch===yData.palace.branch);
    if(orig){
      txt+='<p>与原局<strong>'+orig.name+'</strong>宫重叠，此年'+orig.name+'领域将受重点影响。';
      if(orig.name==='命宫')txt+='今年整体运势起伏较大，需稳字当头。';
      else if(orig.name==='财帛')txt+='今年财运有变，需谨慎理财。';
      else if(orig.name==='官禄')txt+='今年事业有变动之机，可主动把握。';
      else if(orig.name==='夫妻')txt+='今年感情生活有变数，需用心经营。';
      txt+='</p>';
    }
  }
  
  // 大限
  if(yData.daXian){
    txt+='<div class="divider"></div>';
    txt+='<h4>☯ 大限参考</h4>';
    txt+='<p>当前大限：'+yData.daXian.startAge+'~'+yData.daXian.endAge+'岁，走<strong>'+yData.daXian.palacesName+'</strong>宫。</p>';
    const dxStars=ms(yData.daXian);
    if(dxStars.length>0){
      txt+='<p>大限宫主星：'+dxStars.map(s=>s.name).join('、')+'。此十年大运基调由此而定。</p>';
    }
  }
  
  txt+='<div class="divider"></div>';
  txt+='<p class="dim">批曰：流年如风，来去有时。善信当顺势而为，不可强求。吉年当把握，凶年当守成。</p>';
  txt+='<div class="seal">— '+year+'年流年批命 —</div>';
  return txt;
}

// ── 事业分析（命理师风格）──
function answerCareerMaster(){
  const d=chartData;
  const guan=pn(d,'官禄');
  const ming=pn(d,'命宫');
  let txt='<div class="master-mark">事业前程批命</div>';
  txt+='<div class="divider"></div>';
  
  // 官禄宫
  txt+='<h4>☯ 官禄宫析评</h4>';
  const gStars=ms(guan);
  if(gStars.length===0){
    txt+='<p>官禄宫无主星（空宫），事业动向受对宫<strong>'+(pn(d,'夫妻')?pn(d,'夫妻').name:'')+'</strong>影响。宜灵活应变，不宜固守一业。</p>';
  }else{
    gStars.forEach(s=>{
      txt+='<p><strong>'+s.name+'</strong>'+'['+(s.brightness||'平')+']'+(s.siHua?' 化'+hn(s.siHua):'')+'入官禄宫——';
      const meanings={
        '紫微':'帝星坐官禄，天生有领导才能，适合管理、创业，一生贵人不绝。宜把握权位之机。',
        '天机':'机谋星坐官禄，事业靠智谋策划。适合参谋、策划、IT、学术。变动中求发展。',
        '太阳':'光明星坐官禄，适合公职、教育、传媒等公开事业。名声重于利益，宜走正道。',
        '武曲':'财星坐官禄，事业靠实力技术。适合金融、工程、军警。实干兴邦，不宜投机。',
        '天同':'福星坐官禄，事业平稳，适合文职、服务、艺术。不求大富大贵，但求安稳自在。',
        '廉贞':'囚星坐官禄，适合法律、审计、纪律部队。行事需正，不可有私心。',
        '天府':'库星坐官禄，适合管理、财务、政府机构。稳健中求发展，不宜冒进。',
        '太阴':'富星坐官禄，适合设计、会计、护理、文艺。宜发挥细腻特质，不宜粗犷行事。',
        '贪狼':'桃花星坐官禄，事业多才多艺，适合演艺、销售、公关。人脉即财脉，需善加利用。',
        '巨门':'暗星坐官禄，适合律师、教师、研究员。口才、深度是最大优势。需注意口舌是非。',

// ── 大限分析（命理师风格）──
function answerDaXianMaster(){
  const d=chartData;
  let txt='<div class="master-mark">人生大运批命</div>';
  txt+='<div class="divider"></div>';
  
  if(!d.pastYears||d.pastYears.length===0){
    txt+='<p>大限数据不足，无法详细批命。请确认排盘数据完整。</p>';
    return txt;
  }
  
  // 找出当前和下一个大限
  const nowXu=d.currentAge||(currentYear-d.birth.year);
  const das=d.pastYears.filter(y=>y.daXian).reduce((acc,y)=>{
    const key=y.daXian.startAge+'-'+y.daXian.endAge;
    if(!acc.find(a=>a.key===key))acc.push({key:key,start:y.daXian.startAge,end:y.daXian.endAge,palaceName:y.daXian.palacesName,exampleYear:y.year});
    return acc;
  },[]).sort((a,b)=>a.start-b.start);
  
  if(das.length>0){
    txt+='<h4>☯ 大限走势</h4>';
    das.forEach((dx,i)=>{
      const isNow=nowXu>=dx.start&&nowXu<=dx.end;
      txt+='<p>'+(isNow?'<strong>【当前】</strong>':'')+'<strong>'+dx.start+'~'+dx.end+'岁</strong>：走<strong>'+dx.palaceName+'</strong>宫';
      if(isNow)txt+='（此十年大运正在行进中）';
      txt+='</p>';
    });
    txt+='<div class="divider"></div>';
  }
  
  // 当前大限详细分析
  const nowDa=d.pastYears.find(y=>y.daXian&&nowXu>=y.daXian.startAge&&nowXu<=y.daXian.endAge);
  if(nowDa&&nowDa.daXian){
    txt+='<h4>☯ 当前大限（'+nowDa.daXian.startAge+'~'+nowDa.daXian.endAge+'岁）详细分析</h4>';
    const dxPalace=d.palaces.find(p=>p.name===nowDa.daXian.palacesName);
    if(dxPalace){
      const dxStars=ms(dxPalace);
      if(dxStars.length>0){
        txt+='<p>大限宫主星：'+dxStars.map(s=>s.name).join('、')+'</p>';
        dxStars.forEach(s=>{
          txt+='<p>'+s.name+'坐大限宫——';
          if(['紫微','天府','武曲'].includes(s.name))txt+='此十年事业财运较旺，宜把握机遇。';
          else if(['天同','天梁'].includes(s.name))txt+='此十年平稳安康，宜稳字当头。';
          else if(['贪狼','破军','七杀'].includes(s.name))txt+='此十年变动较大，有机遇也有挑战，需谨慎应对。';
          else txt+='此十年运势需综合论断。';
          txt+='</p>';
        });
      }
    }
  }
  
  txt+='<div class="divider"></div>';
  txt+='<p class="dim">批曰：大运如四季，有春夏秋冬。善信当知天时，春种、夏长、秋收、冬藏，自能顺天应命。</p>';
  txt+='<div class="seal">— 人生大运批命 —</div>';
  return txt;
}

// ── 工具函数 ──
function pn(d,n){return d.palaces.find(p=>p.name===n)}
function ms(p){return p.stars.filter(s=>s.type==='major')}
function hn(v){const m={lu:'禄',quan:'权',ke:'科',ji:'忌'};return m[v]||v}
function getCurrentDaXian(){
  const d=chartData;if(!d||!d.pastYears)return '';
  const nowXu=d.currentAge||(currentYear-d.birth.year);
  const y=d.pastYears.find(y=>y.daXian&&nowXu>=y.daXian.startAge&&nowXu<=y.daXian.endAge);
  return y?y.daXian.startAge+'-'+y.daXian.endAge+'岁（'+y.daXian.palacesName+'宫）':'';
}
function detectPatterns(){
  const d=chartData;if(!d)return [];
  const allMajors=[];
  d.palaces.forEach(p=>ms(p).forEach(s=>{if(!allMajors.includes(s.name))allMajors.push(s.name)}));
  const patterns=[];
  const ming=ms(pn(d,'命宫')).map(s=>s.name);
  if(ming.includes('紫微')&&ming.includes('天府'))patterns.push({name:'紫府同宫',desc:'命宫紫微天府同坐，一生尊贵有福气，适合做老板或高管。然需防过于自我。'});
  if(ming.includes('太阳')&&ming.includes('太阴'))patterns.push({name:'日月同宫',desc:'日月并明，为人光明磊落又温柔细腻，才华横溢。然需注意阴阳平衡。'});
  if(allMajors.includes('七杀')&&allMajors.includes('破军')&&allMajors.includes('贪狼'))patterns.push({name:'杀破狼',desc:'三颗变动星齐聚，一生波澜壮阔、大起大落。适合创业、军警、艺术。然需防大起大落。'});
  const luCount=d.palaces.filter(p=>p.stars.some(s=>s.name==='禄存'||s.siHua==='lu')).length;
  if(luCount>=3)patterns.push({name:'双禄交流',desc:'禄存和化禄在多个宫位，财运非常有利，一生多逢贵人。然需防禄多反溺。'});
  return patterns;
}
