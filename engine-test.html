<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Engine Test</title></head><body>
<h1>Ziwei Engine Load Test</h1>
<pre id="log"></pre>
<script src="ziwei-full-engine.js"></script>
<script>
var logEl = document.getElementById('log');
try {
  if (typeof window.Ziwei === 'undefined') {
    logEl.textContent = 'FAIL: window.Ziwei is undefined';
  } else {
    logEl.textContent = 'OK: Ziwei loaded\n';
    logEl.textContent += 'computeChart: ' + typeof window.Ziwei.computeChart + '\n';
    logEl.textContent += 'computeHepan: ' + typeof window.Ziwei.computeHepan + '\n';
    var r = window.Ziwei.computeChart(2005,11,2,3,30,'female',108.3);
    logEl.textContent += 'Test chart OK: ' + r.mingPalace.name + '\n';
    logEl.textContent += 'ALL TESTS PASSED';
  }
} catch(e) {
  logEl.textContent = 'ERROR: ' + e.message + '\n' + (e.stack || '');
}
</script>
</body></html>
