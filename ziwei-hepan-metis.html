<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>紫微合盘分析 · Metis</title>
<style>
/* ===== CSS Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;
  --text:#1a1a1a;
  --text-muted:#6b6b6b;
  --text-light:#999;
  --accent:#2563eb;
  --accent-light:#3b82f6;
  --border:#e5e5e5;
  --card-bg:linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.8) 100%);
  --card-shadow:0 4px 24px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -1px 0 rgba(255,255,255,0.1);
  --card-border:0.5px solid rgba(0,0,0,0.2);
  --input-bg:#fafafa;
  --input-border:1px solid #ddd;
}

html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ===== Fixed Header ===== */
.metis-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  pointer-events:none;
  background:#fff;
  border-bottom:1px solid rgba(0,0,0,0.06);
  padding:0 32px;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
}
.metis-header > *{pointer-events:auto}
.metis-logo{
  font-size:clamp(26px,3vw,42px);
  font-weight:900;
  letter-spacing:-0.02em;
  color:#000;
  text-decoration:none;
  user-select:none;
}
.metis-nav-desktop{
  display:flex;align-items:center;gap:28px;
}
.metis-nav-desktop a{
  text-decoration:none;color:var(--text);
  font-size:15px;font-weight:500;
  transition:color .2s;
}
.metis-nav-desktop a:hover,.metis-nav-desktop a.active{color:var(--accent)}
.metis-nav-desktop .version-btn{
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 18px;
  font-size:13px;
  color:var(--text-muted);
  text-decoration:none;
  transition:all .2s;
}
.metis-nav-desktop .version-btn:hover{
  border-color:var(--text);
  color:var(--text);
}

/* Hamburger (mobile) */
.hamburger-btn{
  display:none;
  width:36px;height:36px;
  flex-direction:column;
  justify-content:center;align-items:center;
  gap:5px;
  background:none;border:none;cursor:pointer;
}
.hamburger-btn span{
  display:block;width:22px;height:2px;
  background:#000;border-radius:1px;
  transition:all .3s;
}
.hamburger-btn.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger-btn.open span:nth-child(2){opacity:0}
.hamburger-btn.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* Mobile menu overlay */
.mobile-menu{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:99;
  background:rgba(255,255,255,0.98);
  backdrop-filter:blur(40px);
  flex-direction:column;justify-content:center;align-items:center;
  gap:32px;
  opacity:0;transition:opacity .4s;
}
.mobile-menu.open{
  display:flex;opacity:1;
}
.mobile-menu a{
  font-size:clamp(28px,5vw,48px);
  font-weight:700;
  letter-spacing:-0.02em;
  color:#000;
  text-decoration:none;
  transition:color .2s;
}
.mobile-menu a:hover{color:var(--accent)}
.mobile-menu .menu-label{
  font-size:11px;
  letter-spacing:0.3em;
  color:var(--text-muted);
  margin-bottom:4px;
}

/* ===== Main Content ===== */
.main-content{padding-top:64px}

/* ===== Title Section ===== */
.title-section{
  text-align:center;
  padding:80px 24px 60px;
}
.title-tag{
  font-size:12px;
  letter-spacing:0.3em;
  color:var(--text-muted);
  margin-bottom:16px;
  text-transform:uppercase;
}
.title-main{
  font-size:clamp(36px,6vw,64px);
  font-weight:600;
  letter-spacing:-0.022em;
  margin-bottom:12px;
}
.title-sub{
  font-size:clamp(15px,2vw,18px);
  color:var(--text-muted);
  font-weight:400;
}
.title-divider{
  width:60px;height:2px;
  background:#000;
  margin:32px auto 0;
  border-radius:1px;
}

/* ===== Page Container ===== */
.page-container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px 80px;
}

/* ===== Dual Column Form ===== */
.heming-dual-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  margin-bottom:32px;
}

/* Glass card */
.heming-person-card{
  background:var(--card-bg);
  border:var(--card-border);
  border-radius:16px;
  padding:24px;
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  box-shadow:var(--card-shadow);
}
.person-label{
  font-size:13px;
  font-weight:700;
  letter-spacing:0.15em;
  color:var(--text-muted);
  margin-bottom:20px;
  text-align:center;
}

/* Birth form */
.birthform-card{
  display:flex;flex-direction:column;gap:14px;
}

.form-row{
  display:flex;flex-direction:column;gap:4px;
}
.form-row-label{
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:0.05em;
  font-weight:500;
}

/* Name input */
.input-name{
  background:var(--input-bg);
  border:var(--input-border);
  border-radius:14px;
  padding:12px 14px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.input-name:focus{border-color:var(--accent)}
.input-name::placeholder{color:#ccc}

/* Date selects row */
.select-row{
  display:flex;gap:8px;
}
.select-row select{
  flex:1;
  background:var(--input-bg);
  border:var(--input-border);
  border-radius:14px;
  padding:12px 10px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  outline:none;
  cursor:pointer;
  transition:border-color .2s;
  -webkit-appearance:none;
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 10px center;
  padding-right:28px;
}
.select-row select:focus{border-color:var(--accent)}

/* Calendar toggle */
.calendar-toggle{
  display:flex;gap:4px;
  background:#f5f5f5;
  border-radius:999px;
  padding:3px;
}
.calendar-toggle button{
  flex:1;
  border:none;background:none;
  padding:8px 16px;
  border-radius:999px;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
  color:var(--text-muted);
  transition:all .2s;
}
.calendar-toggle button.active{
  background:#fff;
  color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
  font-weight:600;
}

/* Location picker */
.location-wrapper{position:relative}
.location-btn{
  width:100%;
  background:var(--input-bg);
  border:var(--input-border);
  border-radius:14px;
  padding:12px 14px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  text-align:left;
  cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .2s;
}
.location-btn:hover{border-color:var(--accent)}
.location-btn .arrow{color:#ccc;font-size:10px;transition:transform .2s}
.location-btn .arrow.open{transform:rotate(180deg)}
.location-search-input{
  width:100%;
  background:var(--input-bg);
  border:var(--input-border);
  border-radius:14px;
  padding:10px 14px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  outline:none;
  margin-top:6px;
  display:none;
}
.location-search-input.visible{display:block}
.location-dropdown{
  position:absolute;top:100%;left:0;right:0;
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.12);
  max-height:200px;
  overflow-y:auto;
  z-index:20;
  display:none;
  margin-top:4px;
}
.location-dropdown.visible{display:block}
.location-dropdown-item{
  padding:10px 14px;
  font-size:13px;
  cursor:pointer;
  display:flex;justify-content:space-between;
  transition:background .15s;
}
.location-dropdown-item:hover{background:#f5f5f5}
.location-dropdown-item .city-name{font-weight:500}
.location-dropdown-item .city-lng{color:var(--text-muted);font-size:11px}

/* Time selects */
.time-select-row{
  display:flex;gap:8px;
}
.time-select-row select{
  flex:1;
  background:var(--input-bg);
  border:var(--input-border);
  border-radius:14px;
  padding:12px 10px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  outline:none;
  cursor:pointer;
  -webkit-appearance:none;
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 10px center;
  padding-right:28px;
}
.time-select-row select:focus{border-color:var(--accent)}

/* True solar time display */
.true-solar-display{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:rgba(37,99,235,0.04);
  border-radius:12px;
  font-size:13px;
  color:var(--accent);
  border:1px solid rgba(37,99,235,0.15);
}
.true-solar-display .solar-icon{font-size:16px}
.true-solar-display .solar-time{font-weight:600}

/* Unknown birth time checkbox */
.checkbox-row{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
}
.checkbox-row input[type=checkbox]{
  width:18px;height:18px;
  accent-color:var(--accent);
  cursor:pointer;
}
.checkbox-row label{
  font-size:13px;
  color:var(--text-muted);
  cursor:pointer;
}

/* Gender toggle */
.gender-toggle{
  display:flex;gap:8px;
}
.gender-toggle button{
  flex:1;
  border:1px solid var(--border);
  background:#fff;
  border-radius:999px;
  padding:12px;
  font-size:14px;
  font-family:inherit;
  cursor:pointer;
  color:var(--text-muted);
  transition:all .2s;
}
.gender-toggle button.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

/* ===== Hepan Button Section ===== */
.hepan-action-card{
  background:var(--card-bg);
  border:var(--card-border);
  border-radius:16px;
  padding:32px 24px;
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  box-shadow:var(--card-shadow);
  text-align:center;
  margin-bottom:32px;
}
.hepan-action-title{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-bottom:6px;
}
.hepan-action-hint{
  font-size:14px;
  color:var(--text-muted);
  margin-bottom:24px;
  max-width:500px;
  margin-left:auto;margin-right:auto;
  line-height:1.6;
}
.hepan-submit-btn{
  display:inline-block;
  background:#000;
  color:#fff;
  border:none;
  border-radius:999px;
  padding:16px 48px;
  font-size:17px;
  font-weight:600;
  font-family:inherit;
  letter-spacing:-0.01em;
  cursor:pointer;
  transition:all .3s;
  position:relative;
}
.hepan-submit-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3), 0 0 60px rgba(0,0,0,0.1);
}
.hepan-submit-btn:active{transform:translateY(0)}
.hepan-submit-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}
.hepan-submit-btn .spinner{
  display:none;
  width:20px;height:20px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  vertical-align:middle;
  margin-right:8px;
}
.hepan-submit-btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Status messages */
.hepan-status{
  text-align:center;
  padding:12px;
  margin-bottom:16px;
  border-radius:12px;
  font-size:14px;
  display:none;
}
.hepan-status.visible{display:block}
.hepan-status.error{
  background:rgba(220,38,38,0.06);
  color:#dc2626;
  border:1px solid rgba(220,38,38,0.2);
}
.hepan-status.loading{
  background:rgba(37,99,235,0.06);
  color:var(--accent);
  border:1px solid rgba(37,99,235,0.2);
}

/* ===== Results Section ===== */
.results-section{
  display:none;
  margin-bottom:40px;
}
.results-section.visible{display:block}

/* Score card */
.score-card{
  background:var(--card-bg);
  border:var(--card-border);
  border-radius:16px;
  padding:32px 24px;
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  box-shadow:var(--card-shadow);
  text-align:center;
  margin-bottom:28px;
}
.score-number{
  font-size:clamp(64px,10vw,96px);
  font-weight:900;
  letter-spacing:-0.04em;
  line-height:1;
}
.score-label{
  font-size:14px;
  color:var(--text-muted);
  margin-top:8px;
}
.score-grade{
  font-size:24px;
  font-weight:700;
  margin-top:4px;
}

/* Chart cards */
.chart-dual-section{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  margin-bottom:28px;
}
@media(max-width:800px){
  .chart-dual-section{grid-template-columns:1fr}
}

.chart-card{
  background:var(--card-bg);
  border:var(--card-border);
  border-radius:16px;
  padding:20px;
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  box-shadow:var(--card-shadow);
}
.chart-card-header{
  font-size:15px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-bottom:16px;
  text-align:center;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.chart-card-header .chart-name{
  font-size:12px;
  color:var(--text-muted);
  font-weight:400;
}

/* Palace grid */
.palace-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
  border-radius:8px;
  overflow:hidden;
}
.palace-cell{
  background:#fff;
  padding:8px 6px;
  min-height:70px;
  font-size:10px;
  position:relative;
}
.palace-cell.ming{background:rgba(37,99,235,0.04)}
.palace-cell.shen{background:rgba(139,92,246,0.04)}
.palace-name{font-weight:700;font-size:10px;margin-bottom:2px;color:var(--text)}
.palace-badge{
  position:absolute;top:2px;right:2px;
  font-size:8px;padding:1px 4px;border-radius:3px;
  font-weight:700;
}
.badge-ming{background:var(--accent);color:#fff}
.badge-shen{background:#8b5cf6;color:#fff}
.star-entry{
  font-size:9px;line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.star-major{color:var(--accent);font-weight:600}
.star-minor{color:var(--text-muted)}
.star-lucky{color:#059669}
.star-evil{color:#dc2626}
.star-flower{color:#d946ef}

/* Analysis section */
.analysis-card{
  background:var(--card-bg);
  border:var(--card-border);
  border-radius:16px;
  padding:28px 24px;
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  box-shadow:var(--card-shadow);
}
.analysis-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:20px;
  letter-spacing:-0.01em;
}
.analysis-section{
  margin-bottom:20px;
}
.analysis-section h4{
  font-size:13px;
  font-weight:700;
  color:var(--text-muted);
  letter-spacing:0.05em;
  margin-bottom:8px;
  text-transform:uppercase;
}
.analysis-section p{
  font-size:14px;
  line-height:1.8;
  color:var(--text);
}
.analysis-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:#f8f8f8;
  border-radius:10px;
  margin-bottom:6px;
  font-size:13px;
}
.analysis-item .score-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}

/* ===== Footer ===== */
.metis-footer{
  text-align:center;
  padding:40px 24px 60px;
  border-top:1px solid var(--border);
  margin-top:60px;
}
.footer-links{
  display:flex;justify-content:center;gap:20px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.footer-links a{
  font-size:13px;
  color:var(--text-muted);
  text-decoration:none;
  transition:color .2s;
}
.footer-links a:hover{color:var(--text)}
.footer-separator{color:#ddd}
.footer-icp{
  font-size:12px;
  color:var(--text-light);
  margin-bottom:4px;
}
.footer-copy{
  font-size:12px;
  color:var(--text-light);
}

/* ===== Responsive ===== */
@media(max-width:680px){
  .heming-dual-form{grid-template-columns:1fr}
  .metis-nav-desktop{display:none}
  .hamburger-btn{display:flex}
  .title-section{padding:50px 20px 40px}
  .page-container{padding:0 16px 60px}
  .palace-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:681px){
  .mobile-menu{display:none!important}
}
</style>
</head>
<body>

<!-- ===== Fixed Header ===== -->
<header class="metis-header">
  <a href="#" class="metis-logo">METIS</a>
  <nav class="metis-nav-desktop">
    <a href="#">起盘</a>
    <a href="#" class="active">合盘</a>
    <a href="#" class="version-btn">普通版</a>
  </nav>
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- Mobile menu -->
<nav class="mobile-menu" id="mobileMenu">
  <div class="menu-label">01</div>
  <a href="#">起盘</a>
  <div class="menu-label">02</div>
  <a href="#">合盘</a>
  <div class="menu-label">03</div>
  <a href="#">知识库</a>
  <div class="menu-label">04</div>
  <a href="#">古籍库</a>
</nav>

<!-- ===== Main Content ===== -->
<main class="main-content">

  <!-- Title Section -->
  <section class="title-section">
    <div class="title-tag">02 / SYNASTRY</div>
    <h1 class="title-main">紫微合盘</h1>
    <p class="title-sub">感情 · 合伙 · 亲子 · 朋友</p>
    <div class="title-divider"></div>
  </section>

  <div class="page-container">

    <!-- Dual Column Form -->
    <div class="heming-dual-form">

      <!-- ========== Person A Card ========== -->
      <div class="heming-person-card" id="personACard">
        <div class="person-label">甲方 — A</div>
        <div class="birthform-card">
          <!-- Name -->
          <div class="form-row">
            <label class="form-row-label">姓名（选填）</label>
            <input type="text" class="input-name" id="nameA" placeholder="输入姓名">
          </div>

          <!-- Date selects -->
          <div class="form-row">
            <label class="form-row-label">出生日期</label>
            <div class="select-row">
              <select id="yearA"><option value="">年</option></select>
              <select id="monthA"><option value="">月</option></select>
              <select id="dayA"><option value="">日</option></select>
            </div>
          </div>

          <!-- Calendar toggle -->
          <div class="calendar-toggle">
            <button class="active" data-cal="solar" data-person="A">公历</button>
            <button data-cal="lunar" data-person="A">农历</button>
          </div>

          <!-- Location -->
          <div class="form-row">
            <label class="form-row-label">出生地点</label>

// ============================================================
// TRUE SOLAR TIME
// ============================================================
const DIZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SHICHEN_RANGES = [
  '23:00-01:00','01:00-03:00','03:00-05:00','05:00-07:00',
  '07:00-09:00','09:00-11:00','11:00-13:00','13:00-15:00',
  '15:00-17:00','17:00-19:00','19:00-21:00','21:00-23:00'
];

function calcTrueSolarOffset(lng){
  // offset = (120 - longitude) * 4 minutes
  return (120 - lng) * 4;
}

function calcTrueSolarTime(hour, minute, lng){
  const offsetMin = calcTrueSolarOffset(lng);
  let totalMin = hour * 60 + minute + offsetMin;
  // Clamp to 0-1439
  totalMin = ((totalMin % 1440) + 1440) % 1440;
  const solarHour = Math.floor(totalMin / 60);
  return solarHour;
}

function hourToShichen(hour){
  if(hour === 23 || hour === 0) return 0;
  return Math.ceil(hour / 2);
}

function formatShichen(hour){
  const idx = hourToShichen(hour);
  return DIZHI[idx] + '时（' + SHICHEN_RANGES[idx] + '）';
}

    renderDropdown(person, query);
  });

  // Close dropdown on outside click
  document.addEventListener('click',(e)=>{
    const wrapper = $('locWrapper'+person);
    if(!wrapper.contains(e.target)){
      locSearch.classList.remove('visible');
      locDropdown.classList.remove('visible');
      locArrow.classList.remove('open');
    }
  });
});

function renderDropdown(person, query){
  const dropdown = $('locDropdown'+person);
  let filtered = cityIndex;
  if(query){
    const q = query.toLowerCase();
    filtered = cityIndex.filter(c => c.name.includes(q));
  }

  if(filtered.length === 0){
    dropdown.innerHTML = '<div class="location-dropdown-item" style="color:#999">未找到匹配城市</div>';
  } else {
    dropdown.innerHTML = filtered.slice(0, 30).map(c =>
      '<div class="location-dropdown-item" data-name="'+c.name+'" data-lng="'+c.lng+'">'+
      '<span class="city-name">'+c.name+'</span>'+
      '<span class="city-lng">'+c.lng+'°E</span>'+
      '</div>'
    ).join('');

    dropdown.querySelectorAll('.location-dropdown-item[data-name]').forEach(item=>{
      item.addEventListener('click',()=>{
        const name = item.dataset.name;
        const lng = parseFloat(item.dataset.lng);
        selectCity(person, name, lng);
      });
    });
  }
  dropdown.classList.add('visible');
}

function selectCity(person, name, lng){
  locState[person] = { city: name, lng: lng };
  $('locLabel'+person).textContent = name;
  $('locSearch'+person).classList.remove('visible');
  $('locDropdown'+person).classList.remove('visible');
  $('locArrow'+person).classList.remove('open');
  updateTrueSolar(person);
}

function updateTrueSolar(person){
  const state = locState[person];
  const hourEl = $('hour'+person);
  const solarText = $('solarText'+person);

  if(!state.lng || !hourEl.value){
    solarText.textContent = '真太阳时 → 选择地点和时间后显示';
    return;
  }

  const hour = parseInt(hourEl.value);
  if(isNaN(hour)){
    solarText.textContent = '真太阳时 → 请先选择出生时间';
    return;
  }

  const minute = parseInt($('minute'+person).value) || 0;
  const solarHour = calcTrueSolarTime(hour, minute, state.lng);
  const shichen = formatShichen(solarHour);

  solarText.textContent = '真太阳时 → ' + shichen;
}

// Update true solar when hour/minute changes
['hourA','minuteA','hourB','minuteB'].forEach(id=>{
  $(id).addEventListener('change',()=>{
    const person = id.includes('A') ? 'A' : 'B';
    updateTrueSolar(person);
  });
});

// ============================================================
// VALIDATE FORM
// ============================================================
function validatePerson(person){
  const errors = [];
  const year = parseInt($('year'+person).value);
  const month = parseInt($('month'+person).value);
  const day = parseInt($('day'+person).value);
  const hour = parseInt($('hour'+person).value);
  const minute = parseInt($('minute'+person).value);

  if(isNaN(year)) errors.push('出生年份');
  if(isNaN(month)) errors.push('出生月份');
  if(isNaN(day)) errors.push('出生日期');
  if(isNaN(hour)) errors.push('出生小时');
  if(isNaN(minute)) errors.push('出生分钟');

  return { valid: errors.length === 0, errors };
}

// ============================================================
// API CALLS
// ============================================================
async function fetchChart(person){
  const year = parseInt($('year'+person).value);
  const month = parseInt($('month'+person).value);
  const day = parseInt($('day'+person).value);
  const hour = parseInt($('hour'+person).value);
  const minute = parseInt($('minute'+person).value);
  const gender = getGender(person);
  const state = locState[person];

  let trueSolarHour = hour;
  if(state.lng){
    trueSolarHour = calcTrueSolarTime(hour, minute, state.lng);
  }

  const params = new URLSearchParams({
    year, month, day,
    hour: trueSolarHour,
    minute,
    gender,
    location: state.city || '未知'
  });

  const resp = await fetch(API_BASE + '/chart?' + params.toString());
  if(!resp.ok){
    const err = await resp.json().catch(()=>({error:'请求失败'}));
    throw new Error(err.error || '排盘失败');
  }
  return resp.json();
}

async function fetchHepan(){
  // Create person data objects
  function getPersonData(p){
    const year = parseInt($('year'+p).value);
    const month = parseInt($('month'+p).value);
    const day = parseInt($('day'+p).value);
    const hour = parseInt($('hour'+p).value);
    const minute = parseInt($('minute'+p).value);
    const gender = getGender(p);
    const state = locState[p];
    let trueSolarHour = hour;
    if(state.lng){
      trueSolarHour = calcTrueSolarTime(hour, minute, state.lng);
    }
    return { year, month, day, hour: trueSolarHour, minute, gender };
  }

  const a = getPersonData('A');
  const b = getPersonData('B');

  const params = new URLSearchParams({
    a_year: a.year, a_month: a.month, a_day: a.day, a_hour: a.hour, a_gender: a.gender,
    b_year: b.year, b_month: b.month, b_day: b.day, b_hour: b.hour, b_gender: b.gender
  });

  const resp = await fetch(API_BASE + '/hepan?' + params.toString());
  if(!resp.ok){
    const err = await resp.json().catch(()=>({error:'合盘失败'}));
    throw new Error(err.error || '合盘失败');
  }
  return resp.json();
}

// ============================================================
// RENDER RESULTS
// ============================================================
function renderScore(score){
  let color, grade, comment;
  if(score >= 90){ color = '#059669'; grade = '天作之合'; comment = '命理契合度极高，是难得的良缘'; }
  else if(score >= 80){ color = '#2563eb'; grade = '佳偶天成'; comment = '缘分深厚，有很高的契合度'; }
  else if(score >= 70){ color = '#7c3aed'; grade = '良缘可期'; comment = '整体契合，值得珍惜'; }
  else if(score >= 60){ color = '#d97706'; grade = '一般缘份'; comment = '有缘但需经营，互相理解很重要'; }
  else if(score >= 50){ color = '#dc2626'; grade = '缘浅情疏'; comment = '契合度较低，需更多包容'; }
  else { color = '#991b1b'; grade = '多有不顺'; comment = '命理上不太契合，慎重考虑'; }

  $('scoreCard').innerHTML = `
    <div class="score-number" style="color:${color}">${score}</div>
    <div class="score-grade" style="color:${color}">${grade}</div>
    <div class="score-label">${comment}</div>
  `;
}

function renderChartCard(personName, charName, chartData){
  if(!chartData || !chartData.palaces){
    return '<div class="chart-card"><div class="chart-card-header">'+personName+'<br><span class="chart-name">'+charName+'</span></div><p style="text-align:center;color:#999;padding:20px">命盘数据暂无</p></div>';
  }

  const palaces = chartData.palaces;
  const info = chartData.info || {};
  const birth = chartData.birth || {};

  const mingZhu = info.mingZhu || '';
  const shenZhu = info.shenZhu || '';

  function palaceHtml(p){
    const starsHtml = (p.stars || []).map(s => {
      let cls = 'star-minor';
      if(s.type === 'major') cls = 'star-major';
      else if(s.siHua) cls = 'star-lucky';
      return '<span class="'+cls+'">'+s.name+(s.siHua?'['+s.siHua+']':'')+'</span>';
    }).join(' ');

    let extraClass = '';
    let badge = '';
    if(mingZhu === p.name){ extraClass = ' ming'; badge = '<span class="palace-badge badge-ming">命</span>'; }
    else if(shenZhu === p.name){ extraClass = ' shen'; badge = '<span class="palace-badge badge-shen">身</span>'; }

    return '<div class="palace-cell'+extraClass+'">'+
      badge+
      '<div class="palace-name">'+p.name+'</div>'+
      '<div class="star-entry">'+starsHtml+'</div>'+
      '</div>';
  }

  return '<div class="chart-card">'+
    '<div class="chart-card-header">'+personName+
    '<br><span class="chart-name">'+charName+
    ' · '+birth.gender+' · '+(info.wuxingJu||'')+
    '</span></div>'+
    '<div class="palace-grid">'+palaces.map(palaceHtml).join('')+'</div>'+
    '</div>';
}

function renderAnalysis(result){
  if(!result || !result.data){
    return '<p style="color:#999;text-align:center">暂无分析数据</p>';
  }

  const d = result.data;
  const totalScore = d.total_score || d.totalScore || d.score || 0;
  const breakdown = d.breakdown || d.sub_scores || d.dimensions || {};

  let html = '<div class="analysis-title">合盘分析详情</div>';

  // Dimension scores
  if(Object.keys(breakdown).length > 0){
    html += '<div class="analysis-section"><h4>维度得分</h4>';
    for(const [key, val] of Object.entries(breakdown)){
      const score = typeof val === 'object' ? (val.score || val.value || 0) : val;
      const label = typeof val === 'object' ? (val.label || val.name || key) : key;
      const dotColor = score >= 80 ? '#059669' : score >= 60 ? '#2563eb' : score >= 40 ? '#d97706' : '#dc2626';
      html += '<div class="analysis-item">'+
        '<span class="score-dot" style="background:'+dotColor+'"></span>'+
        '<span style="flex:1">'+label+'</span>'+
        '<span style="font-weight:700">'+score+'分</span>'+
        '</div>';
    }
    html += '</div>';
  }

  // Overview text
  const overview = d.overview || d.summary || d.description || d.overall_text || '';
  if(overview){
    html += '<div class="analysis-section"><h4>综合解读</h4><p>'+overview+'</p></div>';
  }

  // Strengths
  const strengths = d.strengths || d.pros || d.highlights || [];
  if(strengths.length > 0){
    html += '<div class="analysis-section"><h4>优势亮点</h4>';
    strengths.forEach(s => {
      html += '<p style="margin-bottom:8px">✦ '+s+'</p>';
    });
    html += '</div>';
  }

  // Challenges
  const challenges = d.challenges || d.cons || d.warnings || [];
  if(challenges.length > 0){
    html += '<div class="analysis-section"><h4>需注意的方面</h4>';
    challenges.forEach(c => {
      html += '<p style="margin-bottom:8px;color:#dc2626">⚠ '+c+'</p>';
    });
    html += '</div>';
  }

  // Raw detail if nothing else
  if(!overview && Object.keys(breakdown).length === 0){
    html += '<div class="analysis-section"><h4>原始结果</h4>'+
      '<pre style="font-size:12px;white-space:pre-wrap;background:#f8f8f8;padding:16px;border-radius:8px;max-height:400px;overflow-y:auto">'+
      JSON.stringify(d, null, 2)+'</pre></div>';
  }

  return html;
}

async function doHepan(){
  const submitBtn = $('hepanSubmit');
  const statusEl = $('hepanStatus');

  // Validate
  const va = validatePerson('A');
  const vb = validatePerson('B');

  if(!va.valid || !vb.valid){
    const missing = [...(va.valid?[]:['甲方：'+va.errors.join('、')]), ...(vb.valid?[]:['乙方：'+vb.errors.join('、')])];
    showStatus('请完善以下信息：'+missing.join('；'), 'error');
    return;
  }

  // Loading state
  submitBtn.classList.add('loading');
  submitBtn.disabled = true;
  showStatus('正在排盘并分析合盘...', 'loading');
  $('resultsSection').classList.remove('visible');

  try {
    // Fetch both charts in parallel
    const [chartA, chartB] = await Promise.all([
      fetchChart('A'),
      fetchChart('B')
    ]);

    // Fetch hepan result
    const hepanResult = await fetchHepan();

    // Render results
    const nameA = $('nameA').value.trim() || '甲方';
    const nameB = $('nameB').value.trim() || '乙方';

    // Score
    const score = hepanResult.data?.total_score || hepanResult.data?.totalScore || hepanResult.data?.score || 0;
    renderScore(score);

    // Charts
    $('chartDualSection').innerHTML =
      renderChartCard(nameA, chartA.birth ? chartA.birth.gender+' · '+(chartA.info?.wuxingJu||'') : '甲方命盘', chartA) +
      renderChartCard(nameB, chartB.birth ? chartB.birth.gender+' · '+(chartB.info?.wuxingJu||'') : '乙方命盘', chartB);

    // Analysis
    $('analysisCard').innerHTML = renderAnalysis(hepanResult);

    // Show results
    $('resultsSection').classList.add('visible');
    showStatus('', '');
    $('resultsSection').scrollIntoView({behavior:'smooth', block:'start'});

  } catch(err){
    showStatus('合盘分析失败：'+err.message, 'error');
    console.error(err);
  } finally {
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
  }
}

function showStatus(msg, type){
  const el = $('hepanStatus');
  el.textContent = msg;
  el.className = 'hepan-status';
  if(msg){
    el.classList.add(type, 'visible');
  }
}

// ============================================================
// EVENT BINDINGS
// ============================================================
$('hepanSubmit').addEventListener('click', doHepan);

// Keyboard: Enter submits
document.addEventListener('keydown',(e)=>{
  if(e.key === 'Enter' && e.target.tagName === 'INPUT'){
    // Don't submit on location search
    if(e.target.id.startsWith('locSearch')) return;
    e.preventDefault();
    doHepan();
  }
});
