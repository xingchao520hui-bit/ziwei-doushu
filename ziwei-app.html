  cityIndex = [];
  for(const [name,lng] of Object.entries(CITY_LNG)){
    cityIndex.push({name, lng, pinyin: name.split('').map(c=>c).join('')});

function matchLocation(text){
  if(!text) return [];
  const t = text.trim();
  const results = [];
  // 精确包含匹配（优先）

    if(t.includes(entry.name)){
      results.push({...entry, score: 1, matchType: 'contains'});
    }
  }

    for(const entry of cityIndex){
      if(entry.name.includes(t)){
        results.push({...entry, score: 0.5, matchType: 'prefix'});
      }
    }
  }
  // 按分数排序，短的优先（更精确）
  results.sort((a,b)=>b.score-a.score || a.name.length-b.name.length);
  return results.slice(0,12);
}

async function geocodeLocation(){
  const q = document.getElementById('location').value.trim();
  if(!q){ showGeocodeMsg('请先输入出生地点','err'); return; }
  
  // 先在本地库中匹配
  const matches = matchLocation(q);
  if(matches.length > 0 && matches[0].score === 1){
    document.getElementById('location').value = matches[0].name;
    document.getElementById('longitude').value = matches[0].lng;
    showGeocodeMsg('已匹配「'+matches[0].name+'」经度 '+matches[0].lng+'°E','ok');
    return;
  }
  
  // 尝试服务端Nominatim（可能较慢）
  const btn = document.querySelector('.btn-geocode');
  btn.disabled = true; btn.textContent = '⏳';
  showGeocodeMsg('未在本地库查到，正在联网查询...','loading');
  
  const timeout = new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000));
  try {
    const resp = await Promise.race([
      fetch(API+'/geocode?q='+encodeURIComponent(q)),
      timeout
    ]);
    if(resp instanceof Error) throw resp;
    const results = await resp.json();
    btn.disabled = false; btn.textContent = '🔍';
    if(results.error){
      showGeocodeMsg(results.error + '，请在本地库中选择或手动输入经度','err');
    } else {
      let best = results.find(r => r.type === 'city') || results.find(r => r.type === 'administrative') || results[0];
      document.getElementById('longitude').value = best.lon.toFixed(2);
      showGeocodeMsg('📍 '+best.name.split(',')[0]+' → 经度 '+best.lon.toFixed(2)+'°E','ok');
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔍';
    showGeocodeMsg('联网查询超时，请在本地库中选择或手动输入经度','err');
  }
}

function hourToBranchIdx(h){
  if(h===23||h===0) return 0;
  return Math.ceil(h/2);
}
function calcTrueSolar(year,month,day,hour,minute,lng){
  const offsetMin = Math.round((lng - 120) * 4);
  let totalMin = hour * 60 + (minute||0) + offsetMin;
  let adjDay = day, adjMonth = month, adjYear = year;
  if(totalMin < 0){ totalMin += 1440; adjDay--; }
  if(totalMin >= 1440){ totalMin -= 1440; adjDay++; }
  // 处理跨月
  if(adjDay < 1){ adjMonth--; if(adjMonth<1){adjMonth=12;adjYear--;}
    adjDay = new Date(adjYear,adjMonth,0).getDate(); }
  if(adjDay > new Date(adjYear,adjMonth,0).getDate()){ adjDay=1; adjMonth++;
    if(adjMonth>12){adjMonth=1;adjYear++;} }
  const adjHour = Math.floor(totalMin / 60);
  const adjMinute = totalMin % 60;
  const origIdx = hourToBranchIdx(hour);
  const adjIdx = hourToBranchIdx(adjHour);
  const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  return {
    origHour:hour, origMinute:minute, adjHour, adjMinute,
    origDay:day, adjDay, origMonth:month, adjMonth, origYear:year, adjYear,
    offsetMin, longitude:lng,
    origBranch:DZ[origIdx], adjBranch:DZ[adjIdx],
    branchChanged: origIdx !== adjIdx
  };
}

function renderPalaceGrid(d,ming,shen){
    // render in fixed DZ order matching the original template layout
    const dzOrder=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    return dzOrder.map(dz=>{
        const p=d.palaces.find(p=>p.branch===dz);

        let cls='palace';
        if(p.name==='命宫')cls+=' ming';
        if(p.isBodyPalace)cls+=' shen';
        let badges='';
        if(p.name==='命宫')badges+='<span class="palace-badge badge-ming">命</span>';
        if(p.isBodyPalace&&p.name!=='命宫')badges+='<span class="palace-badge badge-shen">身</span>';
        let stars='';
        p.stars.forEach(s=>{
            let cn='';const nm=s.name;
            if(s.type==='major')cn='star-main';
            else if(['天魁','天钺','左辅','右弼','文昌','文曲','禄存','天马'].includes(nm))cn='star-lucky';
            else if(['擎羊','陀罗','火星','铃星','地空','地劫','天空'].includes(nm))cn='star-evil';
            else cn='star-minor';
            stars+=`<div class="${cn}">${allStarName(s)}${s.brightness&&s.brightness!=='平'?'['+s.brightness+']':''}</div>`;
        });
        let lbl=p.name;
        if(p.isBodyPalace)lbl+='(身宫)';
        return `<div class="${cls}">${badges}<div class="palace-name">${dz}宫 · ${lbl}</div><div class="star-list">${stars}</div></div>`;
    }).join('');
}

// Helper: get opposite palace name (对宫)
function getOppositePalaceName(palaceName) {
  const mapping = {
    '命宫': '迁移宫', '兄弟宫': '交友宫', '夫妻宫': '官禄宫',
    '子女宫': '田宅宫', '财帛宫': '福德宫', '疾厄宫': '父母宫',
    '迁移宫': '命宫', '交友宫': '兄弟宫', '官禄宫': '夫妻宫',
    '田宅宫': '子女宫', '福德宫': '财帛宫', '父母宫': '疾厄宫'
  };
  return mapping[palaceName] || '未知';
}

// Helper: calculate lai yin palace (来因宫) based on birth year heavenly stem
function calculateLaiYinPalace(d) {
  // 来因宫计算：根据出生年天干确定
  // 映射表：出生年天干 → 来因宫地支
  const laiYinMapping = {
    '甲': '戌', '丙': '申', '戊': '午', '庚': '辰', '壬': '寅',
    '乙': '酉', '丁': '未', '己': '巳', '辛': '卯', '癸': '亥'
  };
  
  // 计算出生年天干
  const year = d.birth.year;
  const stems = ['癸', '甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬'];
  const remainder = (year - 3) % 10;
  const stem = stems[remainder];
  
  // 查找来因宫地支
  const laiYinBranch = laiYinMapping[stem];
  if (!laiYinBranch) return pn(d, '福德宫'); // 备用
  
  // 在命盘中查找对应地支的宫位
  const laiYinPalace = d.palaces.find(p => p.branch === laiYinBranch);
  return laiYinPalace || pn(d, '福德宫');
}

// Helper: analyze one palace using actual star data
function analyzeOnePalace(p,dummy){
  let txt='';
  const allStars=[...p.stars];
  const majorStars=allStars.filter(s=>['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军'].includes(s.name));
  const luckyStars=allStars.filter(s=>['天魁','天钺','左辅','右弼','文昌','文曲','禄存','天马'].includes(s.name));
  const evilStars=allStars.filter(s=>['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s.name));
  const otherStars=allStars.filter(s=>!majorStars.includes(s)&&!luckyStars.includes(s)&&!evilStars.includes(s));
  
  if(majorStars.length===0){
    txt+=`<p><strong>此宫无主星（借对宫星曜来论）。</strong>该领域受"外来影响"大，弹性强、不受固定约束，顺境借力、逆境则有漂泊感。具体运势需结合对宫（${getOppositePalaceName(p.name)}）星曜和大限飞星来判断。</p>`;

    majorStars.forEach(s=>{
      const m=getPalaceStarMeaning(s.name,p.name);
      if(m){
        txt+=`<p><strong class="highlight">${s.name}[${s.brightness||'平'}]${s.siHua?'[化'+hn(s.siHua)+']':''}</strong>坐<span class="highlight">${p.stem}${p.branch}·${p.name}</span>——${m}。${brightMod(s.brightness)}${siHuaMod(s.siHua)}。</p>`;
      }else{
        txt+=`<p><strong class="highlight">${s.name}[${s.brightness||'平'}]${s.siHua?'[化'+hn(s.siHua)+']':''}</strong>守${p.stem}${p.branch}·${p.name}。${brightMod(s.brightness)}${siHuaMod(s.siHua)}。</p>`;
      }
    });
  }
  
  // 吉星
  if(luckyStars.length>0){
    const lNames=luckyStars.map(s=>s.name).join('、');
    txt+=`<p><span class="star-lucky">【吉星助阵】</span>${lNames}加会，此宫得到额外助力。${
      luckyStars.some(s=>s.name==='天魁'||s.name==='天钺')?'贵人运旺，关键时候有人提携。':''
    }${
      luckyStars.some(s=>s.name==='左辅'||s.name==='右弼')?'有帮手，不至于孤军奋战。':''
    }${
      luckyStars.some(s=>s.name==='文昌'||s.name==='文曲')?'学识才华为此宫增色，以文取胜。':''
    }${
      luckyStars.some(s=>s.name==='禄存')?'财库有锁，资源不轻易流失。':''
    }${
      luckyStars.some(s=>s.name==='天马')?'动中得利，奔波即为收获。':''
    }</p>`;
  }
  
  // 煞星
  if(evilStars.length>0){
    const eNames=evilStars.map(s=>s.name).join('、');
    txt+=`<p><span class="star-evil">【暗面提醒】</span>${eNames}入此宫，带来波折和考验。${
      evilStars.some(s=>s.name==='擎羊'||s.name==='陀罗')?'有反复纠缠之事，需耐心化解。':''
    }${
      evilStars.some(s=>s.name==='火星'||s.name==='铃星')?'突发状况多，做事需留有余地。':''
    }${
      evilStars.some(s=>s.name==='地空'||s.name==='地劫')?'注意计划落空或付出得不到回报。':''
    }</p>`;
  }
  
  // 杂曜
  if(otherStars.length>0){
    const oNames=otherStars.slice(0,4).map(s=>s.name).join('、');
    txt+=`<p style="font-size:11px;color:#888">[杂曜] ${oNames}${otherStars.length>4?'等':''}，增加此宫的细节色彩。</p>`;
  }
  
  return txt;
}

// ──────────────────────────────────────────────
// 断前事·关键年份筛选（纯规则引擎 — 硬筛选）
// ──────────────────────────────────────────────
function renderKeyYears(d){
  if(!d.pastYears||d.pastYears.length===0){
    return '<p style="color:#999">无流年数据，请确认排盘服务正常运行</p>';
  }
  
  // === 常量 ===
  const GAN='甲乙丙丁戊己庚辛壬癸';
  const GSH={
    '甲':['廉贞禄','破军权','武曲科','太阳忌'],'乙':['天机禄','天梁权','紫微科','太阴忌'],
    '丙':['天同禄','天机权','文昌科','廉贞忌'],'丁':['太阴禄','天同权','天机科','巨门忌'],
    '戊':['贪狼禄','太阴权','右弼科','天机忌'],'己':['武曲禄','贪狼权','天梁科','文曲忌'],
    '庚':['太阳禄','武曲权','太阴科','天同忌'],'辛':['巨门禄','太阳权','文曲科','文昌忌'],
    '壬':['天梁禄','紫微权','左辅科','武曲忌'],'癸':['破军禄','巨门权','太阴科','贪狼忌']
  };
  // R1优先宫位: 命宫,夫妻宫,官禄宫,财帛宫,疾厄宫
  const R1_PALACES=['命','夫妻','官禄','财帛','疾厄'];
  // R2优先宫位: 命宫,夫妻宫,官禄宫,财帛宫,疾厄宫,田宅宫
  const R2_PALACES=['命','夫妻','官禄','财帛','疾厄','田宅'];
  
  // === 数据准备 ===
  // 星曜→本命宫映射
  const SPM={};
  d.palaces.forEach(p=>{p.stars.forEach(s=>{SPM[s.name]=p.name;});});
  // 地支→本命宫映射
  const BPM={};
  d.palaces.forEach(p=>{BPM[p.branch]=p.name;});
  // 生年天干
  const BG=GAN[(d.birth.year-4)%10];
  
  // === 逐年份筛选 ===
  const candidates=[];
  
  d.pastYears.forEach(y=>{
    const yr=y.year;
    if(yr<2016||yr>new Date().getFullYear())return;
    const ag=y.age;
    const gan=GAN[(yr-4)%10];
    const sihua=GSH[gan]||[];
    const pb=(y.yearlyPalaceBranch||'').trim();
    const origName=BPM[pb]||'';
    
    // ── 规则1: 流年四化引动 ──
    const r1Hits=[];
    sihua.forEach(s=>{
      const sn=s.replace(/[禄权科忌]/g,'');
      const ht=s.replace(/[^禄权科忌]/g,'');
      if(ht!=='禄'&&ht!=='忌')return; // 只取化禄/化忌
      const sp=(SPM[sn]||'').replace('宫','');
      if(sp&&R1_PALACES.includes(sp)){
        r1Hits.push({star:sn,type:ht,palace:sp});
      }
    });
    const hasR1=r1Hits.length>0;
    // 化忌优先
    const jiHits=r1Hits.filter(m=>m.type==='忌');
    const luHits=r1Hits.filter(m=>m.type==='禄');
    const primary=(jiHits.length>0?jiHits[0]:(luHits.length>0?luHits[0]:null));
    
    // ── 规则2: 流年命宫叠原局 ──
    const en=(origName||'').replace('宫','');
    const hasR2=en&&R2_PALACES.includes(en);
    
    // ── 规则3: 大限引动 ──
    const idx=d.pastYears.indexOf(y);
    const prev=idx>0?d.pastYears[idx-1]:null;
    const next=idx<d.pastYears.length-1?d.pastYears[idx+1]:null;
    const isFirst=prev&&prev.decadalPalace!==y.decadalPalace;
    const isLast=next&&next.decadalPalace!==y.decadalPalace;
    // 流年四化星落入大限宫位
    let dxHit=false;
    const dxp=y.decadalPalace.replace('宫','');
    sihua.forEach(s=>{
      const sn=s.replace(/[禄权科忌]/g,'');
      const ht=s.replace(/[^禄权科忌]/g,'');
      if(ht!=='禄'&&ht!=='忌')return;
      const sp=(SPM[sn]||'').replace('宫','');
      if(sp.replace('宫','')===dxp)dxHit=true;
    });
    const hasR3=isFirst||isLast||dxHit;
    
    // ── 统计 ──
    const rc=(hasR1?1:0)+(hasR2?1:0)+(hasR3?1:0);
    if(rc<2)return; // 至少满足2条
    
    // ── 构建"满足规则"描述 ──
    const rd=[];
    r1Hits.forEach(m=>rd.push('流年'+m.star+'化'+m.type+'入'+m.palace+'宫'));
    if(hasR2)rd.push('流年命宫叠'+en+'宫');
    if(isFirst){rd.push(y.decadalPalace+'大限第一年');
    }else if(isLast){rd.push(y.decadalPalace+'大限最后一年');
    }else if(dxHit){rd.push('流年四化引动大限');}
    
    // ── 确定领域 ──
    let domain='事业';
    if(primary){
      const pm=primary.palace;
      if(pm.includes('夫妻'))domain='感情';
      else if(pm.includes('官禄'))domain='事业';
      else if(pm.includes('财帛'))domain='财运';
      else if(pm.includes('疾厄'))domain='健康';
      else if(pm.includes('命'))domain='事业';
    }else{
      if(en==='夫妻')domain='感情';
      else if(en==='官禄')domain='事业';
      else if(en==='财帛')domain='财运';
      else if(en==='疾厄')domain='健康';
      else if(en==='田宅')domain='家庭';
    }
    
    // ── 生成事件倾向（一句话） ──
    const tendency=getTendency(primary,hasR2,en,isFirst,isLast,dxHit);
    
    candidates.push({
      year:yr,age:ag,rc,hasR1,hasR2,hasR3,
      primary,ruleDesc:rd.join(' + '),
      domain,tendency
    });
  });
  
  // === 排序: 3规则 > 2规则含R1 > 含化忌 >> 其余 ===
  candidates.sort((a,b)=>{
    if(a.rc!==b.rc)return b.rc-a.rc;
    if(a.hasR1!==b.hasR1)return a.hasR1?-1:1;
    if(a.primary&&a.primary.type==='忌'&&(!b.primary||b.primary.type!=='忌'))return -1;
    if(b.primary&&b.primary.type==='忌'&&(!a.primary||a.primary.type!=='忌'))return 1;
    return 0;
  });
  
  const top=candidates.slice(0,5);
  
  // === 渲染（加黑版） ===
  let txt='<div style="background:#f4efe4;border:1px solid #ccc0a0;padding:12px 16px;margin:8px 0;border-radius:4px;font-size:14px;color:#1a1008;line-height:1.6;">';
  txt+='<p style="margin:0 0 4px;"><strong style="font-size:15px;color:#000;">筛选规则</strong><span style="color:#1a1008;">：满足以下至少2条</span></p>';
  txt+='<p style="margin:2px 0;color:#1a1008;">① 流年四化引动：化禄或化忌落入命/夫/官/财/疾宫</p>';
  txt+='<p style="margin:2px 0;color:#1a1008;">② 流年命宫叠原局：叠命/夫/官/财/疾/田宫</p>';
  txt+='<p style="margin:2px 0;color:#1a1008;">③ 大限引动：大限首尾年、或流年四化引动大限宫</p>';
  txt+='</div>';
  
  txt+='<div style="max-height:720px;overflow-y:auto;background:#fffcf8;border:1px solid #d0c4a8;border-radius:4px;">';
  
  top.forEach((yr,i)=>{
    const isNow=yr.year===new Date().getFullYear();
    const starBadge=yr.primary?(yr.primary.type==='忌'?'⚠':'🟢'):'';
    
    txt+=`<div style="padding:16px 18px;border-bottom:1px solid #d0c4a8;background:${isNow?'#ece0c0':''};${i===0?'border-top:none;':''}">`;
    
    // 标题行 — 加黑
    txt+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">`;
    txt+=`<span style="font-size:17px;font-weight:bold;color:#000;">${starBadge} <span style="color:#6b3000;font-weight:bold;">${yr.year}年（虚${yr.age}岁）</span> <span style="font-size:13px;font-weight:600;color:#1a1008;">满足${yr.rc}条规则</span></span>`;
    if(isNow)txt+=`<span style="font-size:12px;font-weight:bold;background:#b8942a;color:#fff;padding:2px 8px;border-radius:3px;">当前</span>`;
    txt+=`</div>`;
    
    // 满足规则 — 加深底框+加黑文字
    txt+=`<div style="background:#ede6d8;padding:10px 12px;margin:4px 0;border-radius:4px;font-size:15px;line-height:1.7;border-left:3px solid ${yr.primary&&yr.primary.type==='忌'?'#8b0000':'#8b6914'};">`;
    txt+=`<p style="margin:0 0 4px;color:#000;"><strong style="font-size:15px;color:#000;">满足规则</strong>：<span style="color:#1a1008;">${yr.ruleDesc}</span></p>`;
    txt+=`<p style="margin:0 0 4px;color:#000;"><strong style="font-size:15px;color:#000;">可能领域</strong>：<span style="color:#1a1008;">${yr.domain}</span></p>`;
    txt+=`<p style="margin:0;color:#000;"><strong style="font-size:15px;color:#000;">事件倾向</strong>：<span style="color:#1a1008;">${yr.tendency}</span></p>`;
    txt+=`</div>`;
    
    txt+=`</div>`;
  });
  
  txt+=`</div>`;
  return txt;
}

// 事件倾向生成器 — 一句话，无模糊词汇，基于规则驱动
function getTendency(primary,hasR2,origPalace,isFirst,isLast,dxHit){
  const parts=[];
  
  if(primary){
    const p=primary.palace;
    const t=primary.type;
    if(t==='忌'){
      if(p==='命')parts.push('易自我困惑或决策失误');
      else if(p==='夫妻')parts.push('易感情不顺或冷战分手');
      else if(p==='官禄')parts.push('易工作/学业有阻碍');
      else if(p==='财帛')parts.push('易破财或意外开销');
      else if(p==='疾厄')parts.push('易健康出状况或情绪低落');
    }else{ // 化禄
      if(p==='命')parts.push('得人赏识但易安于现状');
      else if(p==='夫妻')parts.push('感情有新进展');
      else if(p==='官禄')parts.push('事业/学业遇良机');
      else if(p==='财帛')parts.push('财运有起色');
      else if(p==='疾厄')parts.push('身体状况好转');
    }
  }
  
  if(hasR2&&origPalace==='田宅')parts.push('家庭方面有变动');
  
  if(isFirst)parts.push('进入人生新阶段');
  else if(isLast)parts.push('面临收尾与总结');
  else if(dxHit&&!primary)parts.push('受大限能量推动');
  
  return parts.join('，')||'此年多重引动，变化明显';
}

    if(oppMap[liuNianMing]===jie.branch){reasons.push('流年命宫与本命疾厄宫对冲');if(!level||level!=='high')level='medium'}
    if(reasons.length>0)risks.push({year:yr,vAge,dz,level:level||'low',reasons});
  }
  
  if(risks.length>0){
    txt+=`<h4>流年健康风险年表</h4>`;
    txt+=`<table class="daxian-table"><tr><th>年份</th><th>虚岁</th><th>等级</th><th>推理依据</th></tr>`;

    const highRisks=risks.filter(r=>r.level==='high');
    if(highRisks.length>0){
      txt+=`<div class="warning"><h4>⚠ 重点年份：${highRisks.map(r=>r.year+'年').join('、')}</h4><p>建议<strong>避免危险运动/高风险活动</strong>，定期体检，保持良好作息。</p></div>`;
    }
  }
  return txt;
}

      txt+=`<tr><td><strong>${m.year}年</strong></td><td>${m.vAge}岁</td><td>${starIcon}${'⭐'.repeat(Math.min(m.score-1,4))}</td><td>${m.reasons.join('；')}</td></tr>`;
    });
    txt+=`</table>`;
    txt+=`<p>🌟/💰越多=财运能量越强。财帛宫主星：<span class="highlight">${ms(cai).map(s=>s.name).join('、')}</span>，官禄宫主星：<span class="highlight">${ms(guan).map(s=>s.name).join('、')}</span>，两者共同决定收入模式与财运走向。</p>`;
  }
  return txt;
}

function renderSuggestions(d){
  let txt='';
  const ming=pn(d,'命宫'),fuqi=pn(d,'夫妻'),cai=pn(d,'财帛'),tian=pn(d,'田宅'),jie=pn(d,'疾厄'),guan=pn(d,'官禄');
  
  // 事业——从命宫+官禄宫星曜提取
  txt+=`<div class="suggestion"><h4>✓ 事业方向</h4>`;
  const careerStars=[...ms(ming),...ms(guan)];
  const careerRecs=[];
  careerStars.forEach(s=>{
    const recs={
      '紫微':'适合担任管理者或自行创业','天机':'适合策划/咨询/IT等脑力密集型行业',
      '太阳':'适合教育/传媒/公益等面向公众的行业','武曲':'适合金融/技术/军警等硬实力行业',
      '天同':'适合文职/艺术/公务员等安居型工作','廉贞':'适合法律/纪检/科研等严谨型工作',
      '天府':'适合管理/仓储/金融等积累型工作','太阴':'适合设计/护理/会计等细心型工作',
      '贪狼':'适合市场/商务/娱乐等人脉型工作','巨门':'适合律师/记者/教师等表达型工作',
      '天相':'适合HR/行政/助理等协调型工作','天梁':'适合教育/医疗/法律等清贵型工作',
      '七杀':'适合创业/管理/军警等开创型工作','破军':'适合创新/艺术/创业等变革型工作'
    };
    if(recs[s.name]&&!careerRecs.includes(recs[s.name]))careerRecs.push(recs[s.name]);
  });
  if(careerRecs.length>0)txt+=`<p>${careerRecs.slice(0,3).join('；')}。</p>`;
  else txt+=`<p>适合弹性大、多元化发展路线，随大限流转调整方向。</p>`;
  txt+=`</div>`;
  
  // 财运
  txt+=`<div class="suggestion"><h4>✓ 财运策略</h4>`;
  const caiStars=ms(cai);
  const caiRecs=[];
  caiStars.forEach(s=>{
    if(s.name==='武曲')caiRecs.push('正财路为主，靠专业技能稳定收入');
    if(s.name==='太阴')caiRecs.push('细水长流型，善理财规划，暗财运（副业/投资）有优势');
    if(s.name==='天府')caiRecs.push('稳扎稳打不投机，财富积累虽慢但结实');
    if(s.name==='贪狼')caiRecs.push('靠人脉和资源整合赚钱，多元收入更合适');
    if(s.name==='紫微')caiRecs.push('财路宽广，适合做大格局生意或管理型收入');
    if(s.name==='破军')caiRecs.push('先破后立型，创业收入波动大，需预留缓冲');
    if(s.name==='七杀')caiRecs.push('大进大出型，有魄力但必须控制风险上限');
  });
  if(hs(tian,'紫微')||hs(tian,'禄存'))caiRecs.push('田宅运好，不动产是最优长期投资');
  if(caiRecs.length>0)txt+=`<p>${caiRecs.join('；')}。</p>`;
  else txt+=`<p>财运随大限起伏，建议理财储蓄为主，避免投机。</p>`;
  txt+=`</div>`;
  
  // 感情
  txt+=`<div class="suggestion"><h4>✓ 感情建议</h4>`;
  const fqStars=ms(fuqi);
  const fqRecs=[];
  fqStars.forEach(s=>{
    if(s.name==='天同')fqRecs.push('感情温和是福，但不宜找事业心太强的对象');
    if(s.name==='巨门')fqRecs.push('沟通是毕生课题——坦诚是解药，冷战是毒药');
    if(s.name==='贪狼')fqRecs.push('桃花运旺盛，选择多但需定心择一');
    if(s.name==='七杀')fqRecs.push('感情激烈有火花，需学会包容对方棱角');
    if(s.name==='破军')fqRecs.push('需不断新鲜感，不适合传统婚姻模式');
    if(s.name==='紫微')fqRecs.push('配偶地位高，婚姻中注意权力平衡');
    if(s.name==='天府')fqRecs.push('感情细水长流，日久生情型最稳');
    if(s.name==='天梁')fqRecs.push('可能有年龄差，配偶成熟有长者风范');
  });
  if(fqRecs.length>0)txt+=`<p>${fqRecs.join('；')}。</p>`;
  else txt+=`<p>感情需以真诚和耐心经营，不急于求成。</p>`;
  txt+=`</div>`;
  
  // 健康提醒
  const jieStars=ms(jie);
  if(jieStars.some(s=>['廉贞','七杀','破军'].includes(s.name))||jie.stars.some(s=>['地空','地劫','擎羊','陀罗','火星','铃星'].includes(s.name))){
    txt+=`<div class="warning"><h4>⚠ 健康提醒</h4>`;
    jieStars.forEach(s=>{
      if(s.name==='廉贞')txt+=`<p>注意血液循环/免疫系统，定期体检避高风险。</p>`;
      if(s.name==='七杀')txt+=`<p>注意外伤/意外，行动多加小心。</p>`;
      if(s.name==='破军')txt+=`<p>身体消耗大，注意休息和恢复。</p>`;
    });
    txt+=`</div>`;
  }
  
  return txt;
}

function renderFooter(d,ming,cai,fuqi,tian){
  let jiYu=[];
  const mStars=ms(ming).map(s=>s.name);
  if(mStars.length>0)jiYu.push(mStars.join('、')+'坐命');
  const tStars=ms(tian).map(s=>s.name);
  if(tStars.length>0&&(tStars.includes('紫微')||tStars.includes('天府')||tStars.includes('禄存')))jiYu.push('田宅深厚福禄双全');
  const cStars=ms(cai).map(s=>s.name);
  if(cStars.length>0)jiYu.push(cStars.join('、')+'守财帛，财运有根基');
  
  if(jiYu.length===0)jiYu.push('命盘配置平衡，一生平安');
  
  let txt=`<p><strong>命理师寄语：</strong></p>`;
  txt+=`<p>命主<strong class="highlight">${jiYu.join('，')}</strong>。运势随大限流转，顺境不骄、逆境不馁，修身即是改命。</p>`;
  txt+=`<p style="margin-top:20px;color:#8a7a5a;">—— iztro 紫微斗数排盘系统 ——</p>`;
  txt+=`<p style="color:#8a7a5a;font-size:12px;">注：本分析限于研究/娱乐目的，不构成专业建议。内容由 iztro 引擎排盘 + 星曜数据库自动生成。</p>`;
  return txt;
}

window.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(location.search);
  if(params.has('year'))document.getElementById('year').value=params.get('year');
  if(params.has('month'))document.getElementById('month').value=params.get('month');
  if(params.has('day'))document.getElementById('day').value=params.get('day');
  if(params.has('hour'))document.getElementById('hour').value=params.get('hour');

  getChart();
});
