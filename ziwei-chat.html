<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#1a1a2e;color:#e0d5c1;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#16213e,#0f3460);padding:20px;text-align:center;border-bottom:1px solid #e94560;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(233,69,96,0.1) 0%,transparent 70%);animation:pulse 6s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.header h1{font-size:28px;color:#e94560;text-shadow:0 0 20px rgba(233,69,96,0.5);position:relative;z-index:1}
.header p{color:#a89b8c;font-size:14px;margin-top:5px;position:relative;z-index:1}
.header .tag{display:inline-block;background:rgba(233,69,96,0.2);color:#e94560;padding:2px 10px;border-radius:12px;font-size:12px;margin-top:8px;position:relative;z-index:1}
.container{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;width:100%}
/* 输入表单 */
.input-panel{background:#16213e;border-radius:12px;margin:20px;padding:20px;border:1px solid rgba(233,69,96,0.3)}
.input-panel.collapsed{padding:12px 20px;cursor:pointer}
.input-panel.collapsed:hover{border-color:rgba(233,69,96,0.6)}
.input-panel.collapsed .form-fields{display:none}
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:12px}
.input-group label{display:block;color:#a89b8c;font-size:12px;margin-bottom:4px}
.input-group input,.input-group select{background:#1a1a2e;color:#e0d5c1;border:1px solid #333;border-radius:8px;padding:8px 12px;font-size:14px;width:100%}
.input-group input:focus,.input-group select:focus{outline:none;border-color:#e94560}
.btn-primary{background:linear-gradient(135deg,#e94560,#c73659);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.3s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(233,69,96,0.4)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-row{margin-top:12px;display:flex;gap:10px;align-items:center}
.status-text{color:#e94560;font-size:12px}
/* 概要区 */
.summary-bar{background:#16213e;border-radius:12px;margin:0 20px;padding:12px 16px;border:1px solid rgba(233,69,96,0.2);display:none;font-size:13px;color:#a89b8c}
.summary-bar.show{display:block}
.summary-bar .name{color:#e94560;font-weight:bold}
/* 聊天区 */
.chat-area{flex:1;padding:0 20px 20px;overflow-y:auto}
.chat-messages{display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;padding:14px 18px;border-radius:16px;line-height:1.7;font-size:14px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;background:#16213e;border:1px solid rgba(233,69,96,0.2);border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#e94560,#c73659);color:#fff;border-bottom-right-radius:4px}
.msg .label{font-size:11px;color:#666;margin-bottom:4px;font-weight:bold}
.msg.bot .label{color:#e94560}
.msg.user .label{color:rgba(255,255,255,0.7)}
.msg h4{color:#e94560;margin:8px 0 4px;font-size:14px}
.msg strong{color:#ffd700}
.msg .star-lucky{color:#50fa7b}
.msg .star-evil{color:#ff5555}
.msg .dim{color:#888;font-size:12px}
/* 快捷问题 */
.quick-bar{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.quick-btn{background:#16213e;border:1px solid #333;color:#a89b8c;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.3s}
.quick-btn:hover{border-color:#e94560;color:#e94560}
/* 输入框 */
.chat-input-bar{padding:16px 20px;background:#16213e;border-top:1px solid rgba(233,69,96,0.2);display:flex;gap:10px;align-items:center}
.chat-input-bar input{flex:1;background:#1a1a2e;color:#e0d5c1;border:1px solid #333;border-radius:24px;padding:12px 20px;font-size:14px}
.chat-input-bar input:focus{outline:none;border-color:#e94560}
.chat-input-bar button{background:#e94560;color:#fff;border:none;padding:12px 20px;border-radius:24px;cursor:pointer;font-size:14px;transition:all 0.3s}
.chat-input-bar button:hover{background:#c73659}
.typing{align-self:flex-start;padding:10px 20px;color:#888;font-size:13px;font-style:italic}
/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
/* 响应式 */
@media(max-width:600px){
.header h1{font-size:22px}
.input-grid{grid-template-columns:1fr 1fr}
.msg{max-width:92%}
}

<body>
<div class="header">
<h1>🔮 紫微斗数 · 命理对话</h1>
<p>上传命盘或输入出生信息，向我提问任何命理问题</p>
<span class="tag">基于 iztro 开源引擎 · 14主星×12宫位数据库</span>
</div>

<div class="container">
<div class="input-panel" id="inputPanel">
<div class="panel-header" onclick="togglePanel()" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
<span style="color:#e94560;font-size:15px;font-weight:bold">📋 输入出生信息</span>
<span id="toggleIcon" style="color:#888;font-size:12px">▼ 收起</span>
</div>
<div class="form-fields">
<div class="input-grid">
<div class="input-group"><label>出生年（公历）</label><input type="number" id="year" min="1900" max="2100" placeholder="如 1999"></div>
<div class="input-group"><label>月</label><input type="number" id="month" min="1" max="12" placeholder="如 2"></div>
<div class="input-group"><label>日</label><input type="number" id="day" min="1" max="31" placeholder="如 17"></div>
<div class="input-group"><label>时（24小时制）</label><input type="number" id="hour" min="0" max="23" placeholder="如 22"></div>
<div class="input-group"><label>性别</label><select id="gender"><option value="male">男</option><option value="female">女</option></select></div>
</div>
<div class="btn-row">
<button class="btn-primary" id="btnChart" onclick="doChart()">开始排盘</button>
<span class="status-text" id="statusText"></span>
</div>
</div>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div class="chat-area" id="chatArea">
<div class="chat-messages" id="chatMessages"></div>
</div>

<div class="quick-bar" id="quickBar" style="display:none">
<button class="quick-btn" onclick="ask('帮我看看今年运势')">今年运势</button>
<button class="quick-btn" onclick="ask('事业怎么样')">事业运</button>
<button class="quick-btn" onclick="ask('财运如何')">财运</button>
<button class="quick-btn" onclick="ask('感情婚姻')">婚姻</button>
<button class="quick-btn" onclick="ask('健康方面')">健康</button>
<button class="quick-btn" onclick="ask('性格分析')">性格</button>
<button class="quick-btn" onclick="ask('适合什么行业')">适合行业</button>
<button class="quick-btn" onclick="ask('明年运势')">明年</button>
<button class="quick-btn" onclick="ask('桃花缘分')">桃花</button>
<button class="quick-btn" onclick="ask('贵人运')">贵人</button>
<button class="quick-btn" onclick="ask('人生建议')">人生建议</button>
<button class="quick-btn" onclick="ask('子女运')">子女</button>
</div>

<div class="chat-input-bar" id="inputBar" style="display:none">
<input type="text" id="chatInput" placeholder="输入你的问题...如"今年财运怎么样"" onkeydown="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()">发送</button>
</div>
</div>

<script>
const API = window.location.port === '3211' ? '' : 'http://localhost:3211';
let chartData = null; // 命盘数据缓存
let chatHistory = []; // 对话历史

// ── 面板折叠 ──
function togglePanel(){
  const p = document.getElementById('inputPanel');
  const f = p.querySelector('.form-fields');
  const icon = document.getElementById('toggleIcon');
  if(f.style.display==='none'){f.style.display='';icon.textContent='▼ 收起';}
  else{f.style.display='none';icon.textContent='▶ 展开';}
}

// ── 排盘 ──
async function doChart(){
  const y=parseInt(document.getElementById('year').value);
  const m=parseInt(document.getElementById('month').value);
  const d=parseInt(document.getElementById('day').value);
  const h=parseInt(document.getElementById('hour').value);
  const g=document.getElementById('gender').value;
  const st=document.getElementById('statusText');
  const btn=document.getElementById('btnChart');
  if(!y||!m||!d||h===undefined||isNaN(h)){st.textContent='请填写完整出生信息';return;}
  btn.disabled=true; st.textContent='排盘中...';
  try{
    const resp=await fetch(API+'/chart?year='+y+'&month='+m+'&day='+d+'&hour='+h+'&gender='+g);
    if(!resp.ok)throw new Error('排盘失败');
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    chartData=data;
    // 加载流年数据
    try{
      const pyResp=await fetch(API+'/past-years?year='+y+'&month='+m+'&day='+d+'&hour='+h+'&gender='+g);
      if(pyResp.ok) chartData.pastYears=(await pyResp.json()).years;
    }catch(e){}
    initChat();
    st.textContent='✅ 排盘完成';btn.disabled=false;
  }catch(e){
    st.textContent='❌ '+e.message;btn.disabled=false;btn.textContent='重试';
  }
}

// ── 自动排盘（URL参数） ──
(function autoLoad(){
  const p=new URLSearchParams(location.search);
  if(p.get('year')&&p.get('month')&&p.get('day')&&p.get('hour')!==null){
    document.getElementById('year').value=p.get('year');
    document.getElementById('month').value=p.get('month');
    document.getElementById('day').value=p.get('day');
    document.getElementById('hour').value=p.get('hour');
    if(p.get('gender'))document.getElementById('gender').value=p.get('gender');
    setTimeout(doChart,300);
  }
})();

// ── 初始化聊天 ──
function initChat(){
  // 显示概要
  const d=chartData;
  const sb=document.getElementById('summaryBar');
  sb.className='summary-bar show';
  sb.innerHTML=`<span class="name">${d.birth.gender==='male'?'男':'女'} · ${d.birth.year}年${d.birth.month}月${d.birth.day}日${d.birth.hour}时</span> &nbsp; 命主<strong style="color:#ffd700">${d.info.mingZhu}</strong> · 身主${d.info.shenZhu} · ${d.info.wuxingJu} · ${d.lunar.yearName}`;
  // 显示聊天区
  document.getElementById('quickBar').style.display='';
  document.getElementById('inputBar').style.display='';
  // 清空聊天
  document.getElementById('chatMessages').innerHTML='';
  chatHistory=[];
  // 欢迎消息
  const ming=pn(d,'命宫');
  const mingStars=ming.stars.map(s=>s.name+(s.siHua?'['+hn(s.siHua)+']':'')+'['+(s.brightness||'平')+']').join('、');
  let welcome=`排盘完成！您的命盘如下：\n\n`;
  welcome+=`🔹 <strong>命宫</strong>：${mingStars}\n`;
  welcome+=`🔹 <strong>五行局</strong>：${d.info.wuxingJu}  |  <strong>当前虚岁</strong>：${d.currentAge}\n\n`;
  welcome+=`您可以问我任何关于命盘的问题，例如：\n`;
  welcome+=`• "今年运势怎么样？"\n• "我适合做什么工作？"\n• "感情什么时候来？"\n• "2027年会发生什么？"\n• "帮我分析一下性格"\n• "夫妻宫有什么星？"\n\n`;
  welcome+=`直接在下方输入，或点击快捷按钮~`;
  addBotMsg(welcome);
  // 滚动到底部
  scrollBottom();
}

// ── 发送消息 ──
function ask(text){sendChat(text);}
function sendChat(text){
  const input=document.getElementById('chatInput');
  const q=text||input.value.trim();
  if(!q)return;
  input.value='';
  chatHistory.push({role:'user',text:q});
  addUserMsg(q);
  // 显示思考动画
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const answer=generateAnswer(q,chartData);
    chatHistory.push({role:'bot',text:answer});
    addBotMsg(answer);
    scrollBottom();
  },500+Math.random()*800);
}

function addUserMsg(text){
  const div=document.createElement('div');
  div.className='msg user';
  div.innerHTML='<div class="label">你</div>'+escHTML(text);
  document.getElementById('chatMessages').appendChild(div);
  scrollBottom();
}
function addBotMsg(text){
  const div=document.createElement('div');
  div.className='msg bot';
  div.innerHTML='<div class="label">🔮 命理师</div>'+formatAnswer(text);
  document.getElementById('chatMessages').appendChild(div);
  scrollBottom();
}
function showTyping(){
  const div=document.createElement('div');
  div.className='typing';div.id='typingIndicator';
  div.textContent='🔮 正在分析命盘...';
  document.getElementById('chatMessages').appendChild(div);
  scrollBottom();
}
function hideTyping(){
  const el=document.getElementById('typingIndicator');
  if(el)el.remove();
}
function scrollBottom(){
  const area=document.getElementById('chatArea');
  setTimeout(()=>area.scrollTop=area.scrollHeight,100);
}
function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatAnswer(text){
  return text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/【(.*?)】/g,'<strong class="star-lucky">【$1】</strong>').replace(/⚠️(.*?)(<br>|$)/g,'<span class="star-evil">⚠️$1</span>$2');
}

// ── 辅助函数 ──
function pn(d,n){return d.palaces.find(p=>p.name===n)}
function hn(v){const m={lu:'禄',quan:'权',ke:'科',ji:'忌'};return m[v]||v}
function ms(p){return p.stars.filter(s=>s.type==='major')}
function hs(p,n){return p.stars.some(s=>s.name===n)}
function gs(p,n){return p.stars.find(s=>s.name===n)}
function getAge(){return chartData?chartData.currentAge:0}
function getCurrentYear(){return new Date().getFullYear()}
function getNextYear(){return getCurrentYear()+1}

// ── 宫位通用分析 ──
function analyzePalace(palaceName){
  const d=chartData;
  if(!d)return '请先排盘';
  const p=pn(d,palaceName);
  if(!p)return '未找到'+palaceName;
  let txt='';
  const majors=p.stars.filter(s=>s.type==='major');
  const luckies=p.stars.filter(s=>['天魁','天钺','左辅','右弼','文昌','文曲','禄存','天马'].includes(s.name));
  const evils=p.stars.filter(s=>['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s.name));
  if(majors.length===0){
    txt+='此宫无主星（空宫），需借对宫星曜来论。该领域受外在影响大，弹性强。';
  }else{
    majors.forEach(s=>{
      const m=getPalaceStarMeaning(s.name,palaceName);
      const bw=s.brightness||'平';
      const sh=s.siHua?`【化${hn(s.siHua)}】`:'';
      if(m)txt+=`**${s.name}**[${bw}]${sh}坐${palaceName}：${m}。`;
      if(bw==='旺'||bw==='庙')txt+='庙旺有力，能量正向发挥。';
      else if(bw==='陷')txt+='⚠️落陷无力，能量受阻，需格外努力。';
      if(s.siHua==='lu')txt+=' 化禄——此宫非常有利，锦上添花。';
      else if(s.siHua==='quan')txt+=' 化权——掌控力增强，主动权在手。';
      else if(s.siHua==='ke')txt+=' 化科——名声提升，学业/事业有突破。';
      else if(s.siHua==='ji')txt+=' ⚠️化忌——能量阻塞，需格外注意。';
    });
  }
  if(luckies.length>0){
    const names=luckies.map(s=>s.name).join('、');
    txt+=`\n【吉星加会】${names}`;
    if(luckies.some(s=>s.name==='天魁'||s.name==='天钺'))txt+='，贵人运旺';
    if(luckies.some(s=>s.name==='左辅'||s.name==='右弼'))txt+='，有人帮衬不孤单';
    if(luckies.some(s=>s.name==='文昌'||s.name==='文曲'))txt+='，才华为此增色';
    if(luckies.some(s=>s.name==='禄存'))txt+='，财库稳固不流失';
  }
  if(evils.length>0){
    const names=evils.map(s=>s.name).join('、');
    txt+=`\n⚠️【煞星入宫】${names}，带来波折考验`;
    if(evils.some(s=>s.name==='擎羊'||s.name==='陀罗'))txt+='，有反复纠缠之事';
    if(evils.some(s=>s.name==='火星'||s.name==='铃星'))txt+='，突发状况多需留余地';
    if(evils.some(s=>s.name==='地空'||s.name==='地劫'))txt+='，注意计划落空';
  }
  return txt;
}

function detectPatterns(){
  const d=chartData;
  const ming=pn(d,'命宫');

  const guan=pn(d,'官禄');
  const fuqi=pn(d,'夫妻');
  const ms1=ms(ming).map(s=>s.name);
  const ms2=ms(caib).map(s=>s.name);
  const ms3=ms(guan).map(s=>s.name);
  const allMajor=[];
  d.palaces.forEach(p=>p.stars.filter(s=>s.type==='major').forEach(s=>{if(!allMajor.includes(s.name))allMajor.push(s.name)}));
  const patterns=[];
  // 紫府同宫
  if(ms1.includes('紫微')&&ms1.includes('天府'))patterns.push({name:'紫府同宫',desc:'命宫紫微天府同坐，一生尊贵有福气，适合做老板或高管。婚姻宜找性格温和的对象，事业宜稳健发展不冒进。'});
  // 日月同宫
  if(ms1.includes('太阳')&&ms1.includes('太阴'))patterns.push({name:'日月同宫',desc:'日月并明于命宫，为人光明磊落又温柔细腻，才华横溢但性格有时矛盾。适合教育、传媒、文艺类工作。'});
  // 杀破狼
  if(allMajor.includes('七杀')&&allMajor.includes('破军')&&allMajor.includes('贪狼'))patterns.push({name:'杀破狼格局',desc:'七杀、破军、贪狼三颗变动星齐聚命盘，一生波澜壮阔、大起大落。适合创业/军警/艺术/武术等领域，越折腾越有成就。'});
  // 机月同梁
  if(allMajor.includes('天机')&&allMajor.includes('太阳')&&allMajor.includes('天同')&&allMajor.includes('天梁'))patterns.push({name:'机月同梁',desc:'天机、太阳、天同、天梁四吉星齐聚，适合公职/教育/医疗/行政等体制内工作。为人正直有担当，口碑事业。'});
  // 府相朝垣
  if(allMajor.includes('天府')&&allMajor.includes('天相')&&d.palaces.filter(p=>ms(p).some(s=>s.name==='天府'||s.name==='天相')).length>=2)patterns.push({name:'府相朝垣',desc:'天府天相分布命盘，为人稳重公正、人缘极佳。适合从事管理、协调、行政类工作，人际关系和睦。'});
  // 双禄交流
  const luPalaces=[];
  d.palaces.forEach(p=>{if(p.stars.some(s=>s.name==='禄存'||s.siHua==='lu'))luPalaces.push(p.name)});
  if(luPalaces.length>=3)patterns.push({name:'双禄交流',desc:'禄存和化禄在多个宫位出现，财运非常有利。一生多逢贵人相助，赚钱机会多且来源广。'});
  // 空亡入命
  if(evils_in('命宫'))patterns.push({name:'命宫逢煞',desc:'命宫有煞星入宫，人生波折较多，需靠后天努力弥补先天不足。但煞星也有磨练意志的好处。'});
  return patterns;
}
function evils_in(palaceName){
  const p=pn(chartData,palaceName);
  return p&&p.stars.some(s=>['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s.name));
}

// ── 流年分析 ──
function analyzeYear(year){
  const d=chartData;
  if(!d||!d.pastYears)return null;
  const yData=d.pastYears.find(y=>y.year===year);
  if(!yData)return null;
  let txt=`**${year}年流年分析**（虚岁 ${year-d.birth.year}）\n\n`;
  if(yData.sihua&&yData.sihua.length>0){
    txt+='**四化引动：**\n';
    yData.sihua.forEach(s=>{
      if(s.palace&&s.star){
        const shName=s.fly?'飞化'+hn(s.fly):'会照';
        txt+=`• ${s.palace}宫：${s.star} ${shName} → `;
        if(s.fly==='lu')txt+='财禄增加，该领域有利\n';
        else if(s.fly==='quan')txt+='权力/掌控增强，主动权增加\n';
        else if(s.fly==='ke')txt+='名声/才华展现，人缘好转\n';
        else if(s.fly==='ji')txt+='⚠️能量阻塞，需格外注意此领域\n';
      }
    });
  }
  if(yData.palace){
    txt+=`\n**流年命宫：**${yData.palace.name}（${yData.palace.branch||''}）\n`;
    const liuStars=yData.palace.stars||[];
    if(liuStars.length>0){
      txt+='流年星曜：'+liuStars.map(s=>s.name).join('、')+'\n';
    }
    // 流年命宫与原局宫位重叠
    const origPalace=d.palaces.find(p=>p.branch===(yData.palace.branch||''));
    if(origPalace){
      txt+=`\n流年命宫与原局**${origPalace.name}**重叠，${origPalace.name}领域将受到重点影响。`;
      const origMajor=origPalace.stars.filter(s=>s.type==='major');
      if(origMajor.length>0){
        txt+='原局星曜：'+origMajor.map(s=>s.name+'['+(s.brightness||'平')+']').join('、');
      }
    }
  }
  // 大限信息
  if(yData.daXian){
    txt+=`\n**当前大限：**${yData.daXian.startAge}-${yData.daXian.endAge}岁 · ${yData.daXian.palaceName}宫`;
  }
  return txt;
}

// ── 核心问答引擎 ──
function generateAnswer(question,d){
  if(!d)return '请先输入出生信息完成排盘，才能为您解答命理问题。';
  const q=question.toLowerCase().trim();
  // 提取年份
  const yearMatch=q.match(/(20\d{2}|19\d{2})/);
  const askYear=yearMatch?parseInt(yearMatch[1]):null;
  const thisYear=getCurrentYear();
  const nextYear=getNextYear();
  // 关键词匹配路由
  // 1. 询问某年运势
  if(askYear&&(q.includes('年')||(q.includes('运势')||q.includes('流年')||q.includes('怎么样')))){
    const yAns=analyzeYear(askYear);
    if(yAns)return yAns;
    return `${askYear}年流年数据暂未加载，请稍后再试。`;
  }
  // 2. 今年运势
  if((q.includes('今年')||q.includes(thisYear)||(q.includes('今年')&&q.includes('运')))&&!askYear){
    const yAns=analyzeYear(thisYear);
    if(yAns)return yAns;
  }
  // 3. 明年运势
  if(q.includes('明年')){
    const yAns=analyzeYear(nextYear);
    if(yAns)return yAns;
  }
  // 4. 事业/工作
  if(q.includes('事业')||q.includes('工作')||q.includes('官禄')||q.includes('职业')||q.includes('职业')){
    return answerCareer();
  }
  // 5. 财运/赚钱
  if(q.includes('财')||q.includes('赚钱')||q.includes('收入')||q.includes('钱')){
    return answerWealth();
  }
  // 6. 感情/婚姻/恋爱/桃花
  if(q.includes('感情')||q.includes('婚')||q.includes('恋')||q.includes('桃花')||q.includes('对象')||q.includes('姻缘')||q.includes('伴侣')||q.includes('老公')||q.includes('老婆')||q.includes('男朋友')||q.includes('女朋友')||q.includes('另一半')){
    return answerLove();
  }
  // 7. 健康
  if(q.includes('健康')||q.includes('身体')||q.includes('病')||q.includes('疾厄')){
    return answerHealth();
  }
  // 8. 性格
  if(q.includes('性格')||q.includes('命宫')||q.includes('为人')||q.includes('我是什么')||q.includes('我是')){
    return answerPersonality();
  }
  // 9. 适合什么行业
  if(q.includes('行业')||q.includes('适合')||q.includes('做什么')||q.includes('方向')){
    return answerCareer();
  }
  // 10. 子女
  if(q.includes('子女')||q.includes('小孩')||q.includes('孩子')||q.includes('生')){
    return analyzePalace('子女');
  }
  // 11. 父母
  if(q.includes('父母')||q.includes('爸爸')||q.includes('妈妈')||q.includes('父亲')||q.includes('母亲')){
    return analyzePalace('父母');
  }
  // 12. 福德/精神
  if(q.includes('福德')||q.includes('精神')||q.includes('内心')||q.includes('心理')){
    return analyzePalace('福德');
  }
  // 13. 迁移/出差/出国
  if(q.includes('迁移')||q.includes('出差')||q.includes('出国')||q.includes('外地')||q.includes('旅行')||q.includes('旅游')){
    return analyzePalace('迁移');
  }
  // 14. 田宅/房产
  if(q.includes('田宅')||q.includes('房产')||q.includes('房子')||q.includes('家居')||q.includes('装修')||q.includes('搬家')){
    return analyzePalace('田宅');
  }
  // 15. 兄弟/朋友
  if(q.includes('兄弟')||q.includes('朋友')||q.includes('人际')){
    return analyzePalace('兄弟');
  }
  // 16. 交友/人缘
  if(q.includes('交友')||q.includes('人缘')||q.includes('社交')){
    return analyzePalace('仆役');
  }
  // 17. 贵人
  if(q.includes('贵人')){
    return answerNoble();
  }
  // 18. 格局
  if(q.includes('格局')||q.includes('命格')||q.includes('命局')){
    return answerPattern();
  }
  // 19. 建议/人生
  if(q.includes('建议')||q.includes('人生')||q.includes('怎么')||q.includes('如何')){
    return answerAdvice();
  }
  // 20. 具体宫位查询
  const palaces=['命宫','夫妻','财帛','官禄','迁移','田宅','福德','疾厄','子女','父母','兄弟','仆役'];
  for(const pal of palaces){
    if(q.includes(pal))return analyzePalace(pal);
  }
  // 21. 具体星曜查询
  const starNames=['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军','禄存','文昌','文曲','左辅','右弼','天魁','天钺','擎羊','陀罗','火星','铃星','地空','地劫','天马'];
  for(const star of starNames){
    if(q.includes(star)){
      return answerStarInChart(star);
    }
  }
  // 22. 大限
  if(q.includes('大限')||q.includes('运程')||q.includes('十年')){
    return answerDaXian();
  }
  // 23. 过去/之前的事
  if(q.includes('过去')||q.includes('之前')||q.includes('从前')||q.includes('以前')){
    return answerPastYears();
  }
  // 24. 未来
  if(q.includes('未来')||q.includes('以后')||q.includes('以后')||q.includes('往后')){
    return answerFuture();
  }
  // 25. 综合运势
  if(q.includes('运')||q.includes('运势')){
    return answerOverall();
  }
  // 26. 有什么星
  if(q.includes('什么星')||q.includes('哪些星')||q.includes('有星')){
    return answerAllStars();
  }
  // 默认：综合回答
  return answerDefault(q);
}

  let txt='**财运分析**\n\n';
  txt+='**财帛宫：**\n'+analyzePalace('财帛')+'\n\n';
  txt+='**财运判断：**\n';
  const cai=pn(d,'财帛');
  const hasLu=cai.stars.some(s=>s.name==='禄存'||s.siHua==='lu');
  const hasWu=ms(cai).some(s=>['武曲','天府','太阴','紫微'].includes(s.name));
  const hasEvil=cai.stars.some(s=>['地空','地劫'].includes(s.name));
  if(hasLu)txt+='• 禄存或化禄入财帛宫，**正财运极好**，赚钱比较轻松有保障\n';
  if(hasWu)txt+='• 财星坐守财帛宫，**财源有保障**，适合稳健投资\n';
  if(hasEvil)txt+='⚠️ 煞星入财帛宫，需注意理财风险，不宜投机\n';
  if(!hasLu&&!hasWu&&!hasEvil)txt+='• 财帛宫无特殊吉煞星加持，财运平平，靠后天努力\n';
  // 福德宫看花钱习惯
  const fude=pn(d,'福德');
  const fudeStars=ms(fude).map(s=>s.name);
  if(fudeStars.includes('天同')||fudeStars.includes('太阴'))txt+='\n**消费习惯：**花钱比较节制理性，喜欢存钱\n';
  else if(fudeStars.includes('贪狼')||fudeStars.includes('七杀'))txt+='\n**消费习惯：**花钱比较大方，容易冲动消费，建议做预算\n';
  // 流年财运
  const thisYear=getCurrentYear();
  const yAns=analyzeYear(thisYear);
  if(yAns){
    const luLines=yAns.split('\n').filter(l=>l.includes('禄')&&l.includes('财'));
    if(luLines.length>0)txt+='\n**'+thisYear+'年财运提示：**\n'+luLines.join('\n');
  }
  return txt;
}

function answerPersonality(){
  const d=chartData;
  const ming=pn(d,'命宫');
  let txt='**性格分析（命宫解读）**\n\n';
  txt+='**命宫主星：**\n';
  const mStars=ms(ming);
  if(mStars.length===0){
    txt+='命宫空宫（无主星），需借对宫星曜来论。空宫之人性格弹性大，受环境影响多，善于适应变化，但内心可能缺乏归属感。\n';
  }else{
    mStars.forEach(s=>{
      const nature=starNature(s.name);
      const bw=s.brightness||'平';
      const sh=s.siHua?'【化'+hn(s.siHua)+'】':'';
      txt+=`**${s.name}**[${bw}]${sh}：${nature}\n`;
      if(bw==='旺'||bw==='庙')txt+='庙旺——正面特质发挥充分，性格鲜明突出\n';
      else if(bw==='陷')txt+='⚠️落陷——正面特质打折扣，可能表现出相反的性格面\n';
      if(s.siHua==='lu')txt+='化禄——为人慷慨大方，人缘极佳\n';
      if(s.siHua==='quan')txt+='化权——性格强势有主见，掌控欲强\n';
      if(s.siHua==='ke')txt+='化科——聪明有才华，气质儒雅\n';
      if(s.siHua==='ji')txt+='⚠️化忌——性格偏执或压抑，容易钻牛角尖\n';
    });
  }
  // 身宫补充
  const shen=d.palaces.find(p=>p.isBodyPalace);
  if(shen){
    txt+=`\n**身宫在${shen.name}**：后天努力的方向在${shen.name}领域，随着年龄增长，${shen.name}方面的特质会越来越明显。\n`;
  }
  // 五行局
  txt+=`\n**五行局：${d.info.wuxingJu}**——这是命盘的基本格局，影响一生的基调\n`;
  // 来因宫
  const ly=d.palaces.find(p=>p.branch===getLaiYinBranch(d));
  if(ly)txt+=`**来因宫在${ly.name}**——前世因果落在${ly.name}领域，此生与${ly.name}相关的事情特别有缘\n`;
  return txt;
}

function answerNoble(){
  const d=chartData;
  let txt='**贵人运分析**\n\n';
  let hasKui=false,hasYue=false;
  d.palaces.forEach(p=>{
    const kui=p.stars.find(s=>s.name==='天魁');
    const yue=p.stars.find(s=>s.name==='天钺');
    if(kui){hasKui=true;txt+=`**天魁**在${p.name}宫：白天/阳面贵人，事业上有长辈或上级提携\n`;}
    if(yue){hasYue=true;txt+=`**天钺**在${p.name}宫：夜间/阴面贵人，关键时刻有贵人暗中相助\n`;}
  });
  if(!hasKui&&!hasYue){
    txt+='命盘天魁天钺不明显，贵人运需靠后天积累。建议多结交正能量的人，主动维护人脉关系。\n';
  }
  // 左辅右弼
  let hasZuo=false,hasYou=false;
  d.palaces.forEach(p=>{
    if(p.stars.some(s=>s.name==='左辅')){hasZuo=true;txt+=`**左辅**在${p.name}宫：有贵人同行，遇到困难有人帮忙\n`;}
    if(p.stars.some(s=>s.name==='右弼')){hasYou=true;txt+=`**右弼**在${p.name}宫：有贵人暗中助力，顺水推舟\n`;}

function answerStarInChart(starName){
  const d=chartData;
  let txt=`**${starName}在命盘中的分布**\n\n`;
  let found=false;
  d.palaces.forEach(p=>{
    const star=p.stars.find(s=>s.name===starName);
    if(star){
      found=true;
      const bw=star.brightness||'平';
      const sh=star.siHua?'【化'+hn(star.siHua)+'】':'';
      const nature=starNature(starName);
      txt+=`**${starName}**在**${p.name}**（${p.branch}宫）[${bw}]${sh}\n`;
      if(nature)txt+=`星性：${nature}\n`;
      const meaning=getPalaceStarMeaning(starName,p.name);
      if(meaning)txt+=`解译：${meaning}\n`;
      txt+='\n';
    }
  });
  if(!found)txt+='您命盘中没有'+starName+'，该星不在本命盘内。\n';
  return txt;
}

function answerAllStars(){
  const d=chartData;
  let txt='**命盘全部星曜一览**\n\n';
  d.palaces.forEach(p=>{
    const majors=p.stars.filter(s=>s.type==='major');
    if(majors.length>0){
      txt+=`**${p.name}**（${p.branch}）：${majors.map(s=>s.name+(s.siHua?'['+hn(s.siHua)+']':'')+'['+(s.brightness||'平')+']').join('、')}\n`;
    }
  });
  // 吉星煞星
  txt+='\n**吉星分布：**\n';
  d.palaces.forEach(p=>{
    const luckies=p.stars.filter(s=>['天魁','天钺','左辅','右弼','文昌','文曲','禄存','天马'].includes(s.name));
    if(luckies.length>0)txt+=`• ${p.name}：${luckies.map(s=>s.name).join('、')}\n`;
  });
  txt+='\n**煞星分布：**\n';
  d.palaces.forEach(p=>{
    const evils=p.stars.filter(s=>['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s.name));
    if(evils.length>0)txt+=`⚠️ ${p.name}：${evils.map(s=>s.name).join('、')}\n`;
  });
  return txt;
}

function answerDaXian(){
  const d=chartData;
  if(!d.daXians)return '大限数据暂未加载';
  let txt='**大限运程**\n\n';
  d.daXians.forEach((dx,i)=>{
    const palace=pn(d,dx.palaceName);
    const stars=palace?ms(palace).map(s=>s.name).join('、'):'无主星';
    const current=getAge();
    const isActive=current>=dx.startAge&&current<=dx.endAge;
    txt+=`**${dx.startAge}-${dx.endAge}岁** · ${dx.palaceName}宫${isActive?' ← 当前大限':''}\n`;
    txt+=`  主星：${stars}\n`;
    if(isActive){
      txt+=`  ⚡ 当前正处于此大限，重点关注${dx.palaceName}领域\n`;
    }
    txt+='\n';
  });
  return txt;
}

function answerPastYears(){
  const d=chartData;
  if(!d.pastYears)return '流年数据暂未加载，请稍后再试';
  const thisYear=getCurrentYear();
  let txt='**断前事——关键年份回顾**\n\n';
  const years=d.pastYears.filter(y=>y.year>=2005&&y.year<thisYear);
  years.reverse().forEach(y=>{
    const highlights=[];
    if(y.sihua)y.sihua.forEach(s=>{
      if(s.fly==='ji')highlights.push('化忌引动（重要事件）');
      else if(s.fly==='lu')highlights.push('化禄引动（好事）');
    });
    if(y.isFirstYear)highlights.push('大限转换年（人生转折点）');
    if(y.isLastYear)highlights.push('大限最后一年（阶段总结）');
    if(y.palace){
      const origPalace=d.palaces.find(p=>p.branch===(y.palace.branch||''));
      if(origPalace)highlights.push(`流年命宫叠原局${origPalace.name}`);
    }
    if(highlights.length>0){
      txt+=`**${y.year}年**（${y.year-d.birth.year}岁）：${highlights.join('、')}\n`;
    }
  });
  if(txt==='**断前事——关键年份回顾**\n\n')txt+='暂无关键年份数据\n';
  return txt;
}

function answerFuture(){
  const d=chartData;
  const thisYear=getCurrentYear();
  const next=getNextYear();
  let txt='**未来运势展望**\n\n';
  // 当前大限
  if(d.daXians){
    const current=d.daXians.find(dx=>getAge()>=dx.startAge&&getAge()<=dx.endAge);
    if(current){
      txt+=`**当前大限**（${current.startAge}-${current.endAge}岁）：${current.palaceName}宫\n`;
      txt+=analyzePalace(current.palaceName).split('\n')[0]+'\n\n';
    }
  }
  // 今明两年
  const y1=analyzeYear(thisYear);
  if(y1)txt+=y1.split('\n').slice(0,6).join('\n')+'\n\n';
  const y2=analyzeYear(next);
  if(y2)txt+=y2.split('\n').slice(0,6).join('\n')+'\n';
  return txt;
}

function answerOverall(){
  const d=chartData;
  let txt='**综合运势概览**\n\n';
  txt+='**命宫：**'+ms(pn(d,'命宫')).map(s=>s.name).join('、')+'（'+d.info.mingZhu+'）\n';
  txt+='**五行局：**'+d.info.wuxingJu+'\n\n';
  // 各宫简要
  const briefPalaces=['命宫','夫妻','财帛','官禄','福德','疾厄'];
  briefPalaces.forEach(pal=>{
    const p=pn(d,pal);
    const stars=ms(p).map(s=>s.name+(s.siHua?'['+hn(s.siHua)+']':'')).join('、');
    const evils=p.stars.filter(s=>['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s.name));
    const eNames=evils.map(s=>s.name).join('、');
    txt+=`**${pal}**：${stars||'空宫'}${eNames?' ⚠️'+eNames:''}\n`;
  });
  // 格局
  const patterns=detectPatterns();
  if(patterns.length>0){
    txt+='\n**特殊格局：**\n';
    patterns.forEach(p=>txt+=`• ${p.name}：${p.desc}\n`);
  }
  return txt;
}

function answerDefault(q){
  // 尝试更宽泛匹配
  if(q.includes('星')||q.includes('曜'))return answerAllStars();
  if(q.includes('运'))return answerOverall();
  // 回答综合信息
  return answerOverall()+'\n\n如果您有更具体的问题，比如"今年财运怎么样"、"适合什么工作"、"婚姻感情如何"等，请直接问我，我会为您详细分析~';
}

function getLaiYinBranch(d){
  const stems=['癸','甲','乙','丙','丁','戊','己','庚','辛','壬'];
  const remainder=(d.birth.year-3)%10;
  const stem=stems[remainder];
  const mapping={'甲':'戌','丙':'申','戊':'午','庚':'辰','壬':'寅','乙':'酉','丁':'未','己':'巳','辛':'卯','癸':'亥'};
  return mapping[stem]||'戌';
}
