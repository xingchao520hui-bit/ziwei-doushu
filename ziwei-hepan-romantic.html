<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>💕 紫微斗数缘分合盘 💕</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Microsoft YaHei', 'SimSun', serif;
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 25%, #ffd6e0 50%, #ffc2d1 75%, #ffb3c6 100%);
  color: #4a2030;
  line-height: 1.8;
  padding: 20px;
  min-height: 100vh;
}

/* 爱心漂浮动画 */
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

body::before {
  content: '💕';
  position: fixed;
  top: 20px;
  left: 30px;
  font-size: 60px;
  opacity: 0.15;
  z-index: 0;
  animation: float 6s ease-in-out infinite;
}

body::after {
  content: '💖';
  position: fixed;
  bottom: 20px;
  right: 30px;
  font-size: 60px;
  opacity: 0.15;
  z-index: 0;
  animation: float 6s ease-in-out infinite reverse;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* 标题区域 - 浪漫风格 */
.header {
  text-align: center;
  padding: 50px 20px;
  border-bottom: 3px solid #ff69b4;
  margin-bottom: 40px;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '💑';
  position: absolute;
  top: 10px;
  left: 20px;
  font-size: 40px;
  opacity: 0.3;
}

.header::after {
  content: '💗';
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 40px;
  opacity: 0.3;
}

.header h1 {
  color: #ff1493;
  font-size: 42px;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.2);
}

.header .subtitle {
  color: #d1477a;
  font-size: 16px;
  font-style: italic;
}

/* 输入区域 */
.input-section {
  display: flex;
  gap: 30px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.person-input {
  background: rgba(255, 255, 255, 0.95);
  padding: 30px;
  border: 2px solid #ffb6c1;
  border-radius: 15px;
  flex: 1;
  min-width: 300px;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
}

.person-input h2 {
  color: #ff1493;
  margin-bottom: 20px;
  font-size: 20px;
  text-align: center;
  border-bottom: 2px solid #ffb6c1;
  padding-bottom: 10px;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  color: #d1477a;
  font-size: 12px;
  margin-bottom: 4px;
  display: block;
  font-weight: bold;
}

.form-group input,
.form-group select {
  padding: 10px 12px;
  background: #fff;
  border: 2px solid #ffb6c1;
  color: #4a2030;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
  transition: all 0.3s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #ff1493;
  box-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
}

/* 按钮 */
.btn-submit {
  display: block;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 15px 30px;
  background: linear-gradient(135deg, #ff69b4, #ff1493);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 2px;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
}

.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* 状态提示 */
.status {
  text-align: center;
  margin-bottom: 20px;
  display: none;
  padding: 10px;
}

.status.show {
  display: block;
}

.status.error {
  color: #dc3545;
}

.status.loading {
  color: #ff1493;
}

/* 结果区域 */
.result-area {
  display: none;
}

.result-area.show {
  display: block;
}

/* 命盘显示 */
.chart-section {
  background: rgba(255, 255, 255, 0.95);
  padding: 30px;
  border: 2px solid #ffb6c1;
  border-radius: 15px;
  margin-bottom: 30px;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
}

.chart-title {
  color: #ff1493;
  font-size: 20px;
  margin-bottom: 20px;
  text-align: center;
  border-bottom: 2px solid #ffb6c1;
  padding-bottom: 10px;
}

.palace-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: #ffb6c1;
  border: 2px solid #ff69b4;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.palace {
  background: rgba(255, 240, 245, 0.9);
  padding: 10px;
  min-height: 100px;
  border: 1px solid #ffc2d1;
  position: relative;
}

.palace.ming {
  background: rgba(255, 228, 225, 0.9);
  border-color: #ff69b4;
}

.palace.shen {
  background: rgba(255, 228, 225, 0.9);
  border-color: #ff1493;
}

.palace-name {
  font-size: 11px;
  color: #d1477a;
  margin-bottom: 5px;
  font-weight: bold;
}

.palace-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
}

.badge-ming {
  background: #ff69b4;
  color: white;
}

.badge-shen {
  background: #ff1493;
  color: white;
}

.star-list {
  font-size: 10px;
  line-height: 1.4;
}

.star-main {
  color: #ff1493;
  font-weight: bold;
}

.star-lucky {
  color: #28a745;
}

.star-evil {
  color: #dc3545;
}

.star-minor {
  color: #888;
}

/* 分数显示 */
.score-section {
  background: rgba(255, 255, 255, 0.95);
  padding: 40px;
  border: 2px solid #ffb6c1;
  border-radius: 15px;
  margin-bottom: 30px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
}

.score-circle {
  display: inline-block;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: rgba(255, 105, 180, 0.1);
  color: #ff1493;
  font-size: 3em;
  font-weight: bold;
  line-height: 150px;
  margin-bottom: 20px;
  border: 3px solid #ff69b4;
  box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
}

.score-text {
  color: #4a2030;
  font-size: 1.3em;
  margin-top: 10px;
}

/* 大白话点评 */
.plain-talk {
  background: rgba(255, 240, 245, 0.8);
  border: 2px solid #ff69b4;
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
  line-height: 2;
}

.plain-talk h3 {
  color: #ff1493;
  margin-bottom: 10px;
  font-size: 16px;
}

.plain-talk p {
  margin-bottom: 10px;
  color: #4a2030;
}

.plain-talk .highlight {
  color: #ff1493;
  font-weight: bold;
}

/* 分析区域 */
.section {
  background: rgba(255, 255, 255, 0.95);
  padding: 30px;
  border: 2px solid #ffb6c1;
  border-radius: 15px;
  margin-bottom: 30px;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
}

.section-title {
  color: #ff1493;
  font-size: 18px;
  margin-bottom: 15px;
  border-bottom: 2px solid #ffb6c1;
  padding-bottom: 10px;
}

/* 维度显示 */
.dimensions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.dimension {
  background: rgba(255, 240, 245, 0.9);
  padding: 20px;
  border: 2px solid #ffc2d1;
  border-radius: 10px;
  text-align: center;
}

.dimension h3 {
  color: #ff1493;
  margin-bottom: 10px;
  font-size: 16px;
}

.dimension .score {
  font-size: 2em;
  font-weight: bold;
  color: #4a2030;
  margin: 10px 0;
}

.dimension .max {
  color: #d1477a;
  font-size: 0.9em;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #ffc2d1;
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff69b4, #ff1493);
  border-radius: 4px;
  transition: width 1s;
}

/* 宫位分析项 */
.palace-item {
  background: rgba(255, 240, 245, 0.9);
  padding: 15px;
  margin-bottom: 10px;
  border: 1px solid #ffc2d1;
  border-radius: 10px;
  border-left: 4px solid #ff69b4;
}

.palace-item.negative {
  border-left-color: #dc3545;
}

.palace-item.positive {
  border-left-color: #28a745;
}

/* 关系标签 */
.relation-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 0.9em;
  font-weight: bold;
  margin-right: 10px;
}

.relation-tag.chong {
  background: #dc3545;
  color: white;
}

.relation-tag.xing {
  background: #c0392b;
  color: white;
}

.relation-tag.hai {
  background: #e67e22;
  color: white;
}

.relation-tag.ke {
  background: #d35400;
  color: white;
}

.relation-tag.liuhe {
  background: #28a745;
  color: white;
}

.relation-tag.sanhe {
  background: #27ae60;
  color: white;
}

.relation-tag.same {
  background: #3498db;
  color: white;
}

.relation-tag.neutral {
  background: #6c757d;
  color: white;
}

/* 响应式 */
@media (max-width: 768px) {
  .palace-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .input-section {
    flex-direction: column;
  }
  
  .header h1 {
    font-size: 28px;
  }
  
  .palace {
    min-height: 75px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💕 紫微斗数缘分合盘 💕</h1>
    <p class="subtitle">天定缘分 · 星盘相映 · 爱情匹配分析</p>
  </div>

  <!-- 输入区域 -->
  <div class="input-section">
    <div class="person-input">
      <h2>💘 第一人信息</h2>
      <div class="form-group">
        <label>年份</label>
        <input type="number" id="a_year" value="1993" min="1900" max="2100">
      </div>
      <div class="form-group">
        <label>月份</label>
        <input type="number" id="a_month" value="5" min="1" max="12">
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="number" id="a_day" value="3" min="1" max="31">
      </div>
      <div class="form-group">
        <label>时辰</label>
        <select id="a_hour">
          <option value="0">子时 (23:00-01:00)</option>
          <option value="2">丑时 (01:00-03:00)</option>
          <option value="4">寅时 (03:00-05:00)</option>
          <option value="6">卯时 (05:00-07:00)</option>
          <option value="8">辰时 (07:00-09:00)</option>
          <option value="10">巳时 (09:00-11:00)</option>
          <option value="12">午时 (11:00-13:00)</option>
          <option value="14">未时 (13:00-15:00)</option>
          <option value="16">申时 (15:00-17:00)</option>
          <option value="18">酉时 (17:00-19:00)</option>
          <option value="20">戌时 (19:00-21:00)</option>
          <option value="22">亥时 (21:00-23:00)</option>
        </select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="a_gender">
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
    </div>

    <div class="person-input">
      <h2>💝 第二人信息</h2>
      <div class="form-group">
        <label>年份</label>
        <input type="number" id="b_year" value="1988" min="1900" max="2100">
      </div>
      <div class="form-group">
        <label>月份</label>
        <input type="number" id="b_month" value="6" min="1" max="12">
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="number" id="b_day" value="20" min="1" max="31">
      </div>
      <div class="form-group">
        <label>时辰</label>
        <select id="b_hour">
          <option value="0">子时 (23:00-01:00)</option>
          <option value="2">丑时 (01:00-03:00)</option>
          <option value="4">寅时 (03:00-05:00)</option>
          <option value="6">卯时 (05:00-07:00)</option>
          <option value="8">辰时 (07:00-09:00)</option>
          <option value="10">巳时 (09:00-11:00)</option>
          <option value="12" selected>午时 (11:00-13:00)</option>
          <option value="14">未时 (13:00-15:00)</option>
          <option value="16">申时 (15:00-17:00)</option>
          <option value="18">酉时 (17:00-19:00)</option>
          <option value="20">戌时 (19:00-21:00)</option>
          <option value="22">亥时 (21:00-23:00)</option>
        </select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="b_gender">
          <option value="male">男</option>
          <option value="female" selected>女</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="btnSubmit" onclick="startHepan()">💖 开始缘分分析 💖</button>
  
  <div class="status" id="status"></div>

  <!-- 结果区域 -->
  <div class="result-area" id="result">
    <!-- 命盘显示 -->
    <div class="chart-section">
      <div class="chart-title" id="chartATitle"></div>
      <div class="palace-grid" id="palaceGridA"></div>
    </div>
    
    <div class="chart-section">
      <div class="chart-title" id="chartBTitle"></div>
      <div class="palace-grid" id="palaceGridB"></div>
    </div>

    <!-- 合盘结果 -->
    <div id="hepanResult" style="display:none;">
      <div class="score-section">
        <div class="score-circle" id="scoreCircle">0</div>
        <div class="score-text" id="scoreText"></div>
      </div>

      <div class="plain-talk" id="overallPlainTalk"></div>

      <div class="section">
        <div class="section-title">📊 各维度评分</div>
        <div class="dimensions" id="dimensions"></div>
      </div>

      <div class="section">
        <div class="section-title">🏠 宫位对齐分析</div>

        <div class="plain-talk" id="palacePlainTalk"></div>
      </div>

      <div class="section">
        <div class="section-title">⭐ 星曜互动分析</div>
        <div id="starSummary"></div>
        <div id="starHits"></div>

      </div>

        <div class="section-title">✨ 四化互动分析</div>

        <div id="mutagenHits"></div>
        <div class="plain-talk" id="mutagenPlainTalk"></div>
      </div>

      <div class="section">
        <div class="section-title">🧭 缘分深度分析（生肖入宫）</div>
        <div id="zodiacSummary"></div>
        <div id="zodiacHits"></div>
        <div class="plain-talk" id="zodiacPlainTalk"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 标准化 chart API 返回数据 → hepan 页面格式
function normalizeChartData(apiData) {
  const d = apiData;
  const birth = d.birth || {};
  const gender = birth.gender === 'male' ? '男' : '女';
  const solarDate = `${birth.year}-${String(birth.month).padStart(2,'0')}-${String(birth.day).padStart(2,'0')}`;
  return {
    birth_info: { gender, solar_date: solarDate },
    palaces: (d.palaces || []).map(p => ({
      name: p.name,
      earthly_branch: p.branch,
      major_stars: (p.stars || []).filter(s => s.type === 'major').map(s => s.name),
      is_body: p.isBodyPalace
    }))
  };
}

// 大白话点评生成函数
function generateOverallPlainTalk(score) {
  let html = '<h3>💬 大白话点评</h3>';
  
  if (score >= 80) {
    html += '<p>天造地设的一对！你们的星盘配合度非常高，<span class="highlight">天生缘分深厚</span>，在一起会很幸福。但要注意，缘分好也要懂得珍惜，不要因为太顺利就忽略了对对方的关心。</p>';
  } else if (score >= 60) {
    html += '<p>很有潜力的一对！你们有合适的方面，也有需要磨合的地方。<span class="highlight">互相理解、多多沟通</span>是关键。只要愿意为对方付出，你们的关系会越来越好。</p>';
  } else if (score >= 40) {
    html += '<p>需要努力的一对。你们的性格和处事方式有较大差异，<span class="highlight">需要更多包容和理解</span>。建议多站在对方角度思考，不要固执己见。缘分可以培养，关键是双方都愿意付出。</p>';
  } else {
    html += '<p>挑战较大的一对。你们的星盘显示很多不同之处，在一起需要<span class="highlight">更多的耐心和智慧</span>。如果真心想在一起，就要做好长期磨合的准备。有时候，差异也能成为互补，关键是心态。</p>';
  }
  
  return html;
}

function generatePalacePlainTalk(data) {
  const hits = data.hits || [];
  const palaceHits = hits.filter(h => h.dimension === 'palace_alignment');
  
  let html = '<h3>💬 宫位互动总结</h3>';
  
  if (palaceHits.length === 0) {
    html += '<p>双方宫位没有形成明显的冲克或助力关系，感情基础平平，需要后天经营。</p>';
    return html;
  }
  
  // 分类统计
  const goodRels = ['he','liuhe','sanhe','same'];
  const badRels = ['chong','xing','hai','ke'];
  const goodHits = palaceHits.filter(h => goodRels.includes(h.evidence.relation));
  const badHits = palaceHits.filter(h => badRels.includes(h.evidence.relation));
  
  html += '<div style="background:#fdf6f0; border-radius:10px; padding:12px 16px; margin-bottom:10px;">';
  
  if (goodHits.length > 0) {
    html += '<p style="color:#2e7d32;"><strong>✅ 有利方面：</strong></p>';
    // 去重
    const seenGood = new Set();
    goodHits.forEach(h => {
      const pair = h.evidence.left_palace + '-' + h.evidence.right_palace;
      if (seenGood.has(pair)) return;
      seenGood.add(pair);
      const relCN = {he:'和谐',liuhe:'六合',sanhe:'三合',same:'同宫'}[h.evidence.relation] || h.evidence.relation;
      html += `<p style="margin:2px 0; padding-left:8px;">• ${h.evidence.left_palace} ↔ ${h.evidence.right_palace}（${relCN}）${
        h.evidence.left_palace === '夫妻' ? '——感情模式契合，互相能满足对方的情感需求' :
        h.evidence.left_palace === '福德' ? '——精神追求和内在世界有共鸣，能聊到一起去' :
        h.evidence.left_palace === '命宫' ? '——性格底色互补，相处自然不累' :
        h.evidence.left_palace === '财帛' ? '——金钱观和消费习惯比较合拍' : ''
      }</p>`;
    });
  }
  
  if (badHits.length > 0) {
    html += '<p style="color:#c0392b; margin-top:8px;"><strong>⚠️ 需要注意：</strong></p>';
    const seenBad = new Set();
    badHits.forEach(h => {
      const pair = h.evidence.left_palace + '-' + h.evidence.right_palace;
      if (seenBad.has(pair)) return;
      seenBad.add(pair);
      const relCN = {chong:'相冲',xing:'相刑',hai:'相害',ke:'相克'}[h.evidence.relation] || h.evidence.relation;
      html += `<p style="margin:2px 0; padding-left:8px;">• ${h.evidence.left_palace} ↔ ${h.evidence.right_palace}（${relCN}）${
        h.evidence.left_palace === '夫妻' ? '——感情需求和表达方式有差异，容易互相不理解' :
        h.evidence.left_palace === '福德' ? '——精神世界不太同频，需要更多互相包容' :
        h.evidence.left_palace === '命宫' ? '——性格底色冲突，一个急一个慢（或一个主动一个被动），磨合费劲' :

function generateMutagenPlainTalk(data) {
  const mutagenDim = data.dimensions.find(d => d.id === 'mutagen_interaction');
  const allChain = (mutagenDim && mutagenDim.all_mutagen_chain) || [];
  const matchedHits = data.hits.filter(h => h.dimension === 'mutagen_interaction' && h.evidence.matched);
  
  let html = '<h3>💬 四化互动具体解读</h3>';
  
  if (allChain.length === 0 && matchedHits.length === 0) {
    html += '<p>双方命盘之间没有明显的四化引动，在一起后运势不会因为对方而发生大的变化。平稳也是一种福气。</p>';
    return html;
  }
  
  // 使用完整的四化链数据
  const displayChain = allChain.length > 0 ? allChain : matchedHits.map(h => ({
    direction: h.evidence.direction === 'A->B' ? 'A→B' : 'B→A',
    type: h.evidence.type === 'lu' ? '化禄' : h.evidence.type === 'ji' ? '化忌' : h.evidence.type === 'quan' ? '化权' : '化科',
    star: h.evidence.star || '',
    palace: h.evidence.target_palace || '',
    meaning: ''
  }));
  
  const dirGroups = { 'A→B': [], 'B→A': [] };
  displayChain.forEach(c => { if (dirGroups[c.direction]) dirGroups[c.direction].push(c); });
  
  html += '<div style="background:#f0f4fd; border-radius:10px; padding:12px 16px; margin-bottom:10px;">';
  Object.keys(dirGroups).forEach(dir => {
    const items = dirGroups[dir];
    if (items.length === 0) return;
    const dirLabel = dir === 'A→B' ? '第一人对第二人' : '第二人对第一人';
    html += `<p style="font-weight:bold; color:#1a5276; margin-top:6px;">📌 ${dirLabel}的影响：</p>`;
    items.forEach(c => {
      const emoji = c.type === '化禄' ? '🟢' : c.type === '化权' ? '🔵' : c.type === '化科' ? '🟣' : '🔴';
      html += `<p style="margin:4px 0; padding-left:12px;">${emoji} <strong>${c.star}${c.type}</strong> → 落入 <strong>${c.palace}</strong>`;
      if (c.meaning) html += ` — ${c.meaning}`;
      html += '</p>';
    });
  });
  html += '</div>';
  
  // 总结
  const luItems = displayChain.filter(c => c.type === '化禄');
  const jiItems = displayChain.filter(c => c.type === '化忌');
  
  if (luItems.length > jiItems.length) {
    html += `<p>你们的四化以化禄为主（${luItems.length}条 vs ${jiItems.length}条），在一起后运势整体向好，尤其在${[...new Set(luItems.map(c=>c.palace))].join('、')}等方面有明显助力。</p>`;
  } else if (jiItems.length > luItems.length) {
    html += `<p>你们的四化中化忌较多（${jiItems.length}条），在一起可能会面临一些挑战，尤其在${[...new Set(jiItems.map(c=>c.palace))].join('、')}等方面需要特别用心经营。</p>`;
  } else {
    html += '<p>化禄与化忌大致平衡，在一起有得有失。这是大多数关系的常态——有甜蜜的时候，也有需要磨合的地方。</p>';
  }
  
  return html;
}

// 渲染命盘
function renderChart(which, d) {
  const chartDiv = document.getElementById('chart' + which);

  // 显示标题 - 使用 birth_info 而不是 birth

  titleDiv.textContent = `第${which === 'A' ? '一' : '二'}人命盘 — ${genderTitle} ${ymd}`;
  
  // 清空网格
  gridDiv.innerHTML = '';
  
  // 按顺序显示十二宫
  const palaceOrder = ['命宫', '兄弟', '夫妻', '子女', '财帛', '疾厄', '迁移', '仆役', '官禄', '田宅', '福德', '父母'];
  
  palaceOrder.forEach(pname => {
    const p = d.palaces.find(pal => pal.name === pname);
    if (!p) return;
    
    const div = document.createElement('div');
    div.className = 'palace';
    if (p.name === '命宫') div.classList.add('ming');
    if (p.name === '身宫') div.classList.add('shen');
    
    let html = `<div class="palace-name">${p.name} (${p.earthly_branch})</div>`;
    
    // 修复：major_stars 可能是对象数组 [{name,type},...]，需要正确提取 name
    let majorStars = '';
    if (p.major_stars) {
      if (Array.isArray(p.major_stars)) {
        // 检查数组元素是否是对象（有 name 属性）
        if (p.major_stars.length > 0 && typeof p.major_stars[0] === 'object' && p.major_stars[0].name) {
          majorStars = p.major_stars.map(s => s.name).join(' ');
        } else {
          majorStars = p.major_stars.join(' ');
        }
      } else {
        majorStars = p.major_stars.toString();
      }
    }
    
    if (majorStars.trim()) {
      html += `<div class="star-list"><span class="star-main">${majorStars}</span></div>`;
    }
    
    // 同样修复 minor_stars
    let minorStars = '';
    if (p.minor_stars) {
      if (Array.isArray(p.minor_stars)) {
        // 检查数组元素是否是对象（有 name 属性）
        if (p.minor_stars.length > 0 && typeof p.minor_stars[0] === 'object' && p.minor_stars[0].name) {
          minorStars = p.minor_stars.map(s => s.name).join(' ');
        } else {
          minorStars = p.minor_stars.join(' ');
        }
      } else {
        minorStars = p.minor_stars.toString();
      }
    }
    
    if (minorStars.trim()) {
      html += `<div class="star-list"><span class="star-lucky">${minorStars}</span></div>`;
    }
    
    div.innerHTML = html;
    gridDiv.appendChild(div);
  });
}

// 显示合盘结果
function generateConclusion(data) {
  const score = Math.round(data.score || 0);
  const lovePct = (data.love_score && data.love_score.pct) || 0;
  const lifePct = (data.life_score && data.life_score.pct) || 0;
  const zodiacDim = data.dimensions.find(d => d.id === 'zodiac');
  const aInB = zodiacDim && zodiacDim.a_zodiac_b_palace || {};
  const bInA = zodiacDim && zodiacDim.b_zodiac_a_palace || {};
  const zodiacOk = (aInB.is_inner && bInA.is_inner);
  const zodiacBad = (!aInB.is_inner && !bInA.is_inner);

  let lines = [];

  // 1. 缘分深浅（生肖入宫主导）
  if (zodiacBad) {
    lines.push('你们的生肖互入对方六外宫，缘分基础较弱。即使在一起，也容易因为根本性的性格差异而疲惫。');
    if (score >= 60) lines.push('⚠️ 总分虽不低，但缘分根基不足——你们的吸引力可能来自表面条件，不适合长期发展。');
  } else if (zodiacOk) {
    lines.push('你们的生肖互入对方六内宫，缘分根基扎实。这是很难得的先天好感，在一起容易有"似曾相识"的感觉。');
  } else if (aInB.is_inner || bInA.is_inner) {
    const whoIn = aInB.is_inner ? '你' : '对方';
    lines.push(`${whoIn}的生肖落入了对方六内宫，缘分基础尚可，有一方会更主动。建议多观察被动方的真实感受。`);
  } else {
    lines.push('你们的生肖未形成明显的缘分共振，缘分基础一般。需要更多后天的努力来维系。');
  }

  // 2. 喜欢程度（称心分主导）
  const whoLikes = lovePct >= 60 ? '你们内心彼此吸引，精神层面有共鸣' :
    lovePct >= 40 ? '你们在精神层面有一定共鸣，但缺乏强烈的吸引力' :
    '你们的性格和精神追求差异较大，不太容易产生心动的感觉';
  lines.push(whoLikes + '。');

  // 3. 适合程度（如意分主导）
  if (lifePct >= 60) {
    lines.push('你们相处起来很顺，现实中能互相扶持，很适合一起过日子。');
  } else if (lifePct >= 40) {
    lines.push('你们在现实中需要磨合，互相的生活方式有差异，需要更多沟通。');
  } else {
    lines.push('你们在现实中容易有摩擦，建议放慢节奏，多观察日常相处是否合拍。');
  }

  // 4. 综合结论
  if (lovePct >= 60 && lifePct >= 60 && zodiacOk) {
    lines.push('💖 天作之合——你喜欢她，她适合你，缘分也深。');
  } else if (lovePct >= 60 && lifePct < 40) {
    lines.push('💡 你喜欢她，但相处起来会有很多实际冲突。建议先做朋友，深入了解后再决定。');
  } else if (lovePct < 40 && lifePct >= 60) {
    lines.push('💡 你对她没有明显心动，但你们很合适过日子。如果你不追求激情，可以继续。');
  } else if (zodiacBad && score >= 60) {
    lines.push('⚠️ 缘分不足，建议谨慎。表面上的吸引力可能无法支撑长期的相处。');
  } else {
    lines.push('🤝 你们适合做朋友或合作伙伴，感情上需要更多的火候。');
  }

  return lines.join('\n');
}

// 宫位维度解读导向
const PALACE_DIMENSION = {
  '命宫':'性格底色', '夫妻':'感情模式', '福德':'精神世界', '财帛':'金钱观',
  '子女':'子女缘', '迁移':'社交形象', '交友':'朋友圈', '官禄':'事业心',
  '田宅':'家庭观', '疾厄':'身心状态', '兄弟':'手足情', '父母':'长辈缘'
};

function describeStars(stars, gender) {
  if (!stars || stars.length === 0) return '无主星（该宫力量较弱，更受对宫影响）';
  const ta = gender === '女' ? '她' : '他';
  const list = [];
  stars.forEach(s => {
    const name = s.name || s;
    const t = STAR_TRAITS[name];
    if (t) {
      // 按宫位不同选取不同侧重点
      list.push({name, ...t});
    } else {
      list.push({name, nature:'', pos:`${name}特质`, neg:'', vibe:''});
    }
  });
  if (list.length === 0) return '无主星（该宫力量较弱，更受对宫影响）';
  // 综合描述
  const primary = list[0];
  const restNames = list.slice(1).map(s => s.name).join('、');
  let desc = `主星${primary.name}（${primary.nature}）：${ta}${primary.pos}`;
  if (restNames) desc += `，兼${restNames}的影响`;
  if (primary.neg && list.length === 1) desc += `。⚠️ ${primary.neg}`;
  return desc;
}

function generatePalaceStarAnalysis(palaceName, leftStars, rightStars, relation, leftChart, rightChart) {
  const dim = PALACE_DIMENSION[palaceName] || palaceName + '领域';
  const relMap = { he: '和谐', chong: '冲突', xing: '刑克', hai: '相害', ke: '相克', same: '同宫', sanhe: '三合', liuhe: '六合', neutral: '中性' };
  const relLabel = relMap[relation] || relation || '中性';

  // 提取双方的主要星曜姓名
  const leftMajor = (leftStars && leftStars.major_stars || []).map(s => typeof s === 'string' ? s : s.name).filter(Boolean);
  const leftMinor = (leftStars && leftStars.minor_stars || []).map(s => typeof s === 'string' ? s : s.name).filter(Boolean);
  const leftAll = [...leftMajor, ...leftMinor];
  const rightMajor = (rightStars && rightStars.major_stars || []).map(s => typeof s === 'string' ? s : s.name).filter(Boolean);
  const rightMinor = (rightStars && rightStars.minor_stars || []).map(s => typeof s === 'string' ? s : s.name).filter(Boolean);
  const rightAll = [...rightMajor, ...rightMinor];

  const leftGender = leftChart === 'A' ? '男' : '女'; // 粗略（合盘默认A男B女，可以优化）
  const rightGender = leftChart === 'A' ? '女' : '男';
  const leftLabel = leftChart === 'A' ? '你' : 'TA';
  const rightLabel = leftChart === 'A' ? 'TA' : '你';

  let lines = [];
  lines.push(`<strong>${dim} — ${leftLabel}和${rightLabel}在这个维度的具体分析：</strong>`);

  // left person's stars in this palace
  if (leftMajor.length > 0) {
    const desc = describeStars(leftMajor.map(n => ({name:n})), leftGender);
    lines.push(`<span style="color:#e91e63">${leftLabel}的${palaceName}：</span>${desc}`);
  } else {
    lines.push(`<span style="color:#e91e63">${leftLabel}的${palaceName}：</span>无主星，该领域受对宫牵引，表现不太稳定。`);
  }

  // right person's stars in this palace
  if (rightMajor.length > 0) {
    const desc = describeStars(rightMajor.map(n => ({name:n})), rightGender);
    lines.push(`<span style="color:#2196f3">${rightLabel}的${palaceName}：</span>${desc}`);
  } else {
    lines.push(`<span style="color:#2196f3">${rightLabel}的${palaceName}：</span>无主星，该领域受对宫牵引，表现不太稳定。`);
  }

  // 综合解读
  if (palaceName === '福德') {
    lines.push(`<em>你们的精神世界和内在追求——${leftLabel}偏${leftMajor[0] ? STAR_TRAITS[leftMajor[0]]?.vibe || leftMajor[0]+'型' : '不确定'}，${rightLabel}偏${rightMajor[0] ? STAR_TRAITS[rightMajor[0]]?.vibe || rightMajor[0]+'型' : '不确定'}。${relLabel==='和谐'||relLabel==='三合'||relLabel==='六合'?'两种气质相融，精神上容易共鸣。':'两种气质不同，需要互相理解对方的内在需要。'}</em>`);
  } else if (palaceName === '命宫') {
    lines.push(`<em>核心性格——${relLabel==='和谐'||relLabel==='三合'||relLabel==='六合'?'你们性格底色互补，一个主一个辅，相处自然。':'性格底色有差异，一个偏积极一个偏保守（或相反），磨合需要耐心。'}</em>`);
  } else if (palaceName === '夫妻') {
    lines.push(`<em>感情需求——${relLabel==='冲突'||relLabel==='刑克'?'你们对感情的表达方式容易错位：一方要的多一方给的少。建议明确沟通需求。':'你们的感情需求有交集，可以在关系中各自找到位置。'}</em>`);
  } else if (palaceName === '财帛') {
    lines.push(`<em>金钱观念——${leftLabel}偏${leftMajor[0] ? STAR_TRAITS[leftMajor[0]]?.nature || '务实' : '随性'}，${rightLabel}偏${rightMajor[0] ? STAR_TRAITS[rightMajor[0]]?.nature || '随性' : '务实'}。${relLabel==='冲突'?'消费观容易产生摩擦，建议财务分开管理。':'财务观念可以互补，适合一起规划未来。'}</em>`);
  } else {
    // 通用
    const bothStarNames = [...new Set([...leftAll, ...rightAll])];
    const known = bothStarNames.filter(n => STAR_TRAITS[n]);
    if (known.length > 0) {
      lines.push(`<em>${dim}的主角星曜：${known.join('、')}——这些星决定了你们在这个领域的相处模式。</em>`);
    }
  }

  return lines.join('<br>');
}

function displayPalaceAnalysis(data) {
  const palaceHits = data.hits.filter(h => h.dimension === 'palace_alignment');
  const summary = data.dimensions.find(d => d.id === 'palace_alignment');

  const summaryDiv = document.getElementById('palaceSummary');
  if (summary && summary.reason_summary) {
    summaryDiv.innerHTML = `<p>${summary.reason_summary.display_text}</p>`;
  }

  const hitsDiv = document.getElementById('palaceHits');
  hitsDiv.innerHTML = '';

  if (palaceHits.length === 0) {
    hitsDiv.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">双方重要宫位没有明显冲突，也没有特别加分。<span class="highlight">中性关系</span>代表吸引力较弱，平淡中见真情，踏实过日子也很重要。</p>';
    return;
  }

  // 去重 & 排序
  const uniqueHits = [];
  const seenPairs = new Set();
  palaceHits.forEach(h => {
    const palaceA = h.evidence.left_palace;
    const palaceB = h.evidence.right_palace;
    const pairKey = [palaceA, palaceB].sort().join('-');
    if (!seenPairs.has(pairKey)) {
      seenPairs.add(pairKey);
      uniqueHits.push(h);
    }
  });

  const palacePriority = { '夫妻':1,'福德':2,'命宫':3,'财帛':4,'田宅':5,'子女':6,'迁移':7,'交友':8,'官禄':9,'疾厄':10,'兄弟':11,'父母':12 };
  uniqueHits.sort((a, b) => {
    const pa = palacePriority[a.evidence.left_palace] || 99;
    const pb = palacePriority[b.evidence.left_palace] || 99;
    return pa - pb;
  });

  // 显示宫位对比
  uniqueHits.forEach(h => {
    const ev = h.evidence;
    const palaceAName = ev.left_palace || '未知';
    const palaceBName = ev.right_palace || '未知';

    const relMap = { he:'和谐', chong:'冲突', xing:'刑克', hai:'相害', ke:'相克', same:'同宫', sanhe:'三合', liuhe:'六合', neutral:'中性' };
    const relationText = relMap[ev.relation] || ev.relation || '中性';
    const relationColor = ev.relation === 'he' || ev.relation === 'liuhe' ? '#4caf50'
      : ev.relation === 'chong' || ev.relation === 'xing' ? '#f44336'
      : ev.relation === 'hai' || ev.relation === 'ke' ? '#ff9800'
      : '#2196f3';
    const relationIcon = ev.relation === 'he' || ev.relation === 'liuhe' ? '✅'
      : ev.relation === 'chong' || ev.relation === 'xing' ? '❌'
      : ev.relation === 'hai' || ev.relation === 'ke' ? '⚠️'
      : '➕';

    // ⭐ 关键改变：基于星曜的实际分析，替代原来的模板化 plainTalk
    const starAnalysis = generatePalaceStarAnalysis(
      palaceAName,
      ev.left_stars,
      ev.right_stars,
      ev.relation,
      ev.left_chart,
      ev.right_chart
    );

    const item = document.createElement('div');
    item.className = 'palace-item';
    item.style.borderLeft = `4px solid ${relationColor}`;

    item.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div style="font-size: 16px; font-weight: bold; color: #333;">
          ${palaceAName} ↔ ${palaceBName}
        </div>
        <div style="background: ${relationColor}; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px;">
          ${relationIcon} ${relationText}
        </div>
      </div>
      <div style="margin-top: 6px; color: #444; font-size: 13px; line-height: 1.7; background: #f8f9fa; border-radius: 8px; padding: 10px 12px;">
        ${starAnalysis}
      </div>
      <div style="margin-top: 8px; text-align: right; color: ${h.effect > 0 ? '#4caf50' : '#f44336'}; font-weight: bold;">
        ${h.effect > 0 ? '+' : ''}${h.effect.toFixed(2)} 分
      </div>
    `;
    hitsDiv.appendChild(item);
  });

  // 大白话点评
  const plainTalkHtml = generatePalacePlainTalk(data);
  const plainTalkDiv = document.getElementById('palacePlainTalk');
  if (plainTalkDiv) {
    plainTalkDiv.innerHTML = plainTalkHtml;
    plainTalkDiv.style.display = 'block';
  }
}

// 开始合盘分析
async function startHepan() {
  const btn = document.getElementById('btnSubmit');
  const st = document.getElementById('status');
  
  btn.disabled = true;
  btn.textContent = '💕 正在分析中...';
  st.className = 'status show loading';
  st.textContent = '正在准备...';
  
  try {
    // 获取输入参数
    const a_params = {
      year: document.getElementById('a_year').value,
      month: document.getElementById('a_month').value,
      day: document.getElementById('a_day').value,
      hour: document.getElementById('a_hour').value,
      gender: document.getElementById('a_gender').value
    };
    
    const b_params = {
      year: document.getElementById('b_year').value,
      month: document.getElementById('b_month').value,
      day: document.getElementById('b_day').value,
      hour: document.getElementById('b_hour').value,
      gender: document.getElementById('b_gender').value
    };
    
    // 排第一人命盘
    st.textContent = '正在排第一人命盘...';
    const a_query = Object.keys(a_params).map(k => `${k}=${a_params[k]}`).join('&');
    const a_res = await fetch(`/chart?${a_query}&_t=${Date.now()}`);
    const a_data = await a_res.json();
    if (a_data.error) throw new Error('第一人排盘失败: ' + a_data.error);
    const a_chart = a_data.data || a_data;
    
    // 排第二人命盘
    st.textContent = '正在排第二人命盘...';
    const b_query = Object.keys(b_params).map(k => `${k}=${b_params[k]}`).join('&');
    const b_res = await fetch(`/chart?${b_query}&_t=${Date.now()}`);
    const b_data = await b_res.json();
    if (b_data.error) throw new Error('第二人排盘失败: ' + b_data.error);
    const b_chart = b_data.data || b_data;
    
    // 标准化数据格式后显示命盘
    renderChart('A', normalizeChartData(a_chart));
    renderChart('B', normalizeChartData(b_chart));
    
    // 合盘分析
    st.textContent = '正在合盘分析...';
    const hepan_params = {
      a_year: a_params.year,
      a_month: a_params.month,
      a_day: a_params.day,
      a_hour: a_params.hour,
      a_gender: a_params.gender,
      b_year: b_params.year,
      b_month: b_params.month,
      b_day: b_params.day,
      b_hour: b_params.hour,
      b_gender: b_params.gender
    };
    const hepan_query = Object.keys(hepan_params).map(k => `${k}=${hepan_params[k]}`).join('&');
    const hepan_res = await fetch(`/hepan?${hepan_query}&_t=${Date.now()}`);
    const hepan_data = await hepan_res.json();
    if (hepan_data.error) throw new Error('合盘失败: ' + hepan_data.error);
    if (!hepan_data.success) throw new Error('合盘失败');
    
    // 显示合盘结果
    displayResult(hepan_data.data);
    
    // 显示结果区域
    document.getElementById('result').classList.add('show');
    document.getElementById('hepanResult').style.display = 'block';
    
    st.className = 'status';
    btn.disabled = false;
    btn.textContent = '💖 开始缘分分析 💖';
    
    // 滚动到结果区域
    document.getElementById('result').scrollIntoView({behavior: 'smooth'});
    
  } catch(err) {
    st.className = 'status show error';
    st.textContent = '错误: ' + err.message;
    btn.disabled = false;
    btn.textContent = '💖 开始缘分分析 💖';
  }
}
</script>

</body>
</html>
