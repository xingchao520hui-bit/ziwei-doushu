<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命理对话</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0a0a14;color:#d4c5a9;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.upload-page{display:flex;flex:1;width:100%;max-width:600px;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.upload-box{width:100%;border:2px dashed rgba(233,69,96,0.3);border-radius:12px;padding:60px 40px;text-align:center;cursor:pointer;transition:all 0.4s;position:relative}
.upload-box:hover{border-color:rgba(233,69,96,0.7);background:rgba(233,69,96,0.03)}
.upload-box.drag{border-color:#e94560;background:rgba(233,69,96,0.08);transform:scale(1.02)}
.upload-icon{font-size:56px;margin-bottom:16px}
.upload-title{color:#e94560;font-size:18px;letter-spacing:3px;margin-bottom:8px}
.upload-sub{color:#6a5a4a;font-size:13px}
.upload-sub span{color:#c9a96e}
.upload-hint{color:#555;font-size:11px;margin-top:20px}
#fileInput{display:none}
.loading{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.loading .spinner{width:40px;height:40px;border:2px solid rgba(233,69,96,0.2);border-top-color:#e94560;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#8a7a6a;font-size:13px}
.error-msg{color:#ff5555;font-size:13px;text-align:center;margin-top:16px;display:none}
.chat-page{display:none;flex-direction:column;flex:1;width:100%;max-width:860px}
.chat-header{background:rgba(26,26,46,0.95);padding:14px 20px;border-bottom:1px solid rgba(233,69,96,0.15);display:flex;justify-content:space-between;align-items:center}
.chat-header .info{color:#8a7a6a;font-size:12px}
.chat-header .info strong{color:#e94560}
.chat-header .reset{color:#666;font-size:11px;cursor:pointer;padding:4px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:3px;transition:all 0.3s}
.chat-header .reset:hover{color:#e94560;border-color:rgba(233,69,96,0.4)}
.chat-messages{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;min-height:400px}
.msg{max-width:88%;padding:14px 18px;border-radius:4px;line-height:1.85;font-size:14px;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;background:rgba(26,26,46,0.95);border:1px solid rgba(233,69,96,0.1);border-left:3px solid rgba(233,69,96,0.4)}
.msg.user{align-self:flex-end;background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.2);color:#e8d5c5}
.msg.thinking{align-self:flex-start;color:rgba(233,69,96,0.5);font-size:12px;font-style:italic}
.msg h3,.msg h4{color:#c9a96e;margin:6px 0 2px;font-weight:normal}
.msg strong{color:#c9a96e}
.quick-bar{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;border-top:1px solid rgba(255,255,255,0.03)}
.quick-btn{background:rgba(26,26,46,0.8);border:1px solid rgba(255,255,255,0.05);color:#7a6a5a;padding:6px 16px;border-radius:3px;font-size:11px;cursor:pointer;transition:all 0.3s;letter-spacing:1px}
.quick-btn:hover{border-color:rgba(233,69,96,0.3);color:#e94560}
.chat-input-bar{padding:12px 20px;background:rgba(26,26,46,0.95);border-top:1px solid rgba(255,255,255,0.03);display:flex;gap:10px}
.chat-input-bar input{flex:1;background:rgba(13,13,26,0.9);color:#d4c5a9;border:1px solid rgba(255,255,255,0.06);border-radius:3px;padding:10px 16px;font-size:13px;outline:none;transition:border 0.3s}
.chat-input-bar input:focus{border-color:rgba(233,69,96,0.4)}
.chat-input-bar button{background:rgba(233,69,96,0.8);color:#fff;border:none;padding:10px 24px;border-radius:3px;cursor:pointer;font-size:13px;letter-spacing:1px;transition:all 0.3s;white-space:nowrap}
.chat-input-bar button:hover{background:#e94560}
.chat-input-bar button:disabled{opacity:0.4;cursor:not-allowed}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(233,69,96,0.15);border-radius:2px}
</style>
</head>
<body>

<style>
/* 计费样式 */
.credit-bar{display:flex;align-items:center;gap:12px;font-size:12px}
.credit-bar .badge{background:rgba(233,69,96,0.12);color:#e94560;padding:3px 10px;border-radius:10px;letter-spacing:1px;cursor:pointer;transition:all 0.3s}
.credit-bar .badge:hover{background:rgba(233,69,96,0.25)}
.credit-bar .badge.free{background:rgba(76,217,100,0.12);color:#4cd964}

.recharge-card{background:#1a1a2e;border-radius:8px;padding:30px;text-align:center;max-width:340px;width:90%}

.recharge-card .qr-wrap{margin:8px auto;text-align:center}

.recharge-card .amount-btn:hover,.recharge-card .amount-btn.active{background:rgba(233,69,96,0.3);border-color:#e94560;transform:scale(1.05)}

.recharge-card .sid{color:#e94560;font-size:13px;margin:12px 0;word-break:break-all;background:rgba(0,0,0,0.3);padding:8px;border-radius:4px;font-family:monospace}
.recharge-card button.close{width:100%;margin-top:10px;padding:10px;border:none;border-radius:4px;font-size:14px;cursor:pointer;background:#333;color:#888}
.msg.billing{align-self:center;background:rgba(76,217,100,0.08);border:1px solid rgba(76,217,100,0.2);color:#7ab88a;font-size:12px;padding:6px 14px;border-radius:10px;text-align:center}
.cloud-btn{position:fixed;bottom:90px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(26,26,46,0.9);border:1px solid rgba(240,192,64,0.3);color:#f0c040;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.cloud-btn:hover{background:rgba(240,192,64,0.15);border-color:#f0c040;transform:scale(1.1)}
.cloud-toast{position:fixed;bottom:110px;right:70px;background:#1a1a2e;color:#f0c040;padding:8px 14px;border-radius:6px;font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:11}
</style>

<body>

<!-- 充值弹窗 -->
<div class="recharge-overlay" id="rechargeOverlay">
  <div class="recharge-card">
    <h3>🔮 命理咨询 · 充值</h3>
    <p style="color:#aaa;font-size:12px;margin-bottom:8px">¥1/句 · 3次免费提问已用完<br>请扫码支付后联系客服充值</p>
    
    <!-- 金额选择 -->
    <div class="amount-options">
      <button class="amount-btn" onclick="selectAmount(10)">¥10<br><small>10句</small></button>
      <button class="amount-btn" onclick="selectAmount(20)">¥20<br><small>20句</small></button>
      <button class="amount-btn" onclick="selectAmount(50)">¥50<br><small>50句</small></button>
      <button class="amount-btn" onclick="selectAmount(100)">¥100<br><small>100句</small></button>
    </div>
    
    <!-- 收款码 -->
    <div class="qr-wrap">
      <img class="qr-img" src="/qrcode_pay.jpg" alt="微信收款码" />
      <p style="color:#f0c040;font-size:13px;margin:4px 0" id="selectedAmount">请先选择充值金额</p>
    </div>
    
    <p style="color:#888;font-size:10px;margin:8px 0">⚠️ 支付时请备注您的会话ID<br>支付后将以下ID发给客服确认</p>
    <div class="sid" id="sidDisplay">---</div>
    <button class="close" onclick="closeRecharge()">已支付，等客服确认</button>
  </div>
</div>

<script>
// 全局会话
let sessionId = localStorage.getItem('zw_sessionId') || '';
let sessionCredits = localStorage.getItem('zw_sessionCredits') ? parseInt(localStorage.getItem('zw_sessionCredits')) : 0;
let freeMsgsRemaining = localStorage.getItem('zw_freeMsgs') ? parseInt(localStorage.getItem('zw_freeMsgs')) : 3;
let selectedPayAmount = 0;

async function initSession() {
  try {
    const r = await fetch(API + '/api/session', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sessionId })
    });
    const d = await r.json();
    sessionId = d.sessionId;
    sessionCredits = d.credits;
    freeMsgsRemaining = d.freeMsgs ?? 3;
    localStorage.setItem('zw_sessionId', sessionId);
    localStorage.setItem('zw_sessionCredits', sessionCredits);
    localStorage.setItem('zw_freeMsgs', freeMsgsRemaining);
    updateCreditDisplay();
  } catch(e) { console.log('session init:', e); }
}

function updateCreditDisplay() {
  const el = document.getElementById('creditBadge');
  if (!el) return;
  if (freeMsgsRemaining > 0) {
    el.className = 'badge free';
    el.textContent = '🎁 免费×' + freeMsgsRemaining;
    el.title = '还剩' + freeMsgsRemaining + '次免费提问';
  } else {
    el.className = 'badge';
    el.textContent = '💎 ' + sessionCredits + '句';
    el.title = '点击充值';
  }
}

function selectAmount(n) {
  selectedPayAmount = n;
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.amount-btn').classList.add('active');
  document.getElementById('selectedAmount').textContent = '请支付 ¥' + n + '（' + n + '句）';
}

function showRecharge() {
  document.getElementById('sidDisplay').textContent = sessionId.substring(0, 8);
  document.getElementById('selectedAmount').textContent = '请先选择充值金额';
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
  selectedPayAmount = 0;
  document.getElementById('rechargeOverlay').style.display = 'flex';
}

function closeRecharge() {
  document.getElementById('rechargeOverlay').style.display = 'none';
}

// 页面初始化时创建会话
initSession();
</script>

<!-- 上传页面 -->
<div class="upload-page" id="uploadPage">
  <div class="upload-box" id="uploadBox">
    <div class="upload-icon">📐</div>
    <div class="upload-title">请上传您的命盘</div>
    <div class="upload-sub">将<span>紫微斗数命盘 PDF</span> 拖拽至此<br>或点击选择文件</div>
    <div class="upload-hint">支持从本站生成的专业命盘 PDF 文件</div>
  </div>
  <input type="file" id="fileInput" accept=".pdf">
  <div class="error-msg" id="uploadError"></div>
</div>

<!-- 加载 -->
<div class="loading" id="loadingPage">
  <div class="spinner"></div>
  <p id="loadingText">正在解析命盘...</p>
</div>

<!-- 聊天页面 -->
<div class="chat-page" id="chatPage">
  <div class="chat-header">
    <span class="info" id="chatInfo">命理师在线</span>
    <div class="credit-bar">
      <span class="badge free" id="creditBadge" onclick="showRecharge()" title="点击充值">🎁 免费试用中</span>
      <span class="reset" onclick="resetPage()">重新上传</span>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="quick-bar" id="quickBar">
    <button class="quick-btn" onclick="ask('请为我综合分析此命盘')">综合批命</button>
    <button class="quick-btn" onclick="ask('今年运势如何')">流年运势</button>
    <button class="quick-btn" onclick="ask('事业前程如何')">事业前程</button>
    <button class="quick-btn" onclick="ask('财运如何')">财运析评</button>
    <button class="quick-btn" onclick="ask('姻缘感情如何')">姻缘感情</button>
    <button class="quick-btn" onclick="ask('健康状况如何')">健康状况</button>
    <button class="quick-btn" onclick="ask('我的命盘格局如何')">命盘格局</button>
    <button class="quick-btn" onclick="ask('有什么改运建议')">改运建议</button>
  </div>
  <div class="chat-input-bar">
    <input type="text" id="chatInput" placeholder="请赐问..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">赐教</button>
  </div>
  <button class="cloud-btn" id="cloudBtn" onclick="cloudUpload()" title="上传命盘至小程序">☁️</button>
  <div class="cloud-toast" id="cloudToast"></div>
</div>

<script>
const API = window.location.port === '3211' ? '' : 'http://localhost:3211';
let chartData = null;
let chatHistory = [];
let isThinking = false;

// ── PDF.js 初始化 ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── 上传处理 ──
const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');

uploadBox.addEventListener('click', () => fileInput.click());

uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag'));
uploadBox.addEventListener('drop', e => {
  e.preventDefault();
  uploadBox.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processPDF(file);
  else showError('请上传 PDF 文件');
});

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file) processPDF(file);
});

function showError(msg) {
  const el = document.getElementById('uploadError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function processPDF(file) {
  document.getElementById('uploadPage').style.display = 'none';
  document.getElementById('loadingPage').style.display = 'flex';
  document.getElementById('loadingText').textContent = '正在解析命盘 PDF...';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      document.getElementById('loadingText').textContent = '正在解析第 ' + i + '/' + pdf.numPages + ' 页...';
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(' ');
      fullText += text + '\n';
    }

    document.getElementById('loadingText').textContent = '正在提取出生信息...';
    const birth = extractBirthInfo(fullText);

    if (!birth) {
      throw new Error('未能从PDF中提取出生信息。请确认是本站生成的命盘PDF。');
    }

    document.getElementById('loadingText').textContent = '正在排盘... ' + birth.year + '年' + birth.month + '月' + birth.day + '日 ' + birth.hour + '时 ' + birth.gender;

    // 调用排盘API
    const chartUrl = API + '/chart?year=' + birth.year + '&month=' + birth.month + '&day=' + birth.day + '&hour=' + birth.hour + '&gender=' + (birth.gender === '男' ? 'male' : 'female');
    const chartResp = await fetch(chartUrl);
    if (!chartResp.ok) throw new Error('排盘失败');
    chartData = await chartResp.json();
    if (chartData.error) throw new Error(chartData.error);

    // 获取流年数据
    try {
      const pyUrl = API + '/past-years?year=' + birth.year + '&month=' + birth.month + '&day=' + birth.day + '&hour=' + birth.hour + '&gender=' + (birth.gender === '男' ? 'male' : 'female');
      const pyResp = await fetch(pyUrl);
      if (pyResp.ok) {
        const pyData = await pyResp.json();
        chartData.pastYears = pyData.years;
      }
    } catch (e) { /* 非致命 */ }

    // 进入对话
    enterChat(birth);

  } catch (err) {
    document.getElementById('loadingPage').style.display = 'none';
    document.getElementById('uploadPage').style.display = 'flex';
    showError('解析失败：' + err.message);
    console.error(err);
  }
}

function extractBirthInfo(text) {
  // 匹配出生日期
  const patterns = [
    /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/,
    /出生日期[：:]\s*(\d{4})[年\s]*(\d{1,2})[月\s]*(\d{1,2})[日\s]*/,
    /(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/,
  ];

  let y, m, d;
  for (const p of patterns) {
    const match = text.match(p);
    if (match) { y = parseInt(match[1]); m = parseInt(match[2]); d = parseInt(match[3]); break; }
  }
  if (!y) return null;

  // 时间（默认午时12点）
  let h = 12;
  const timePatterns = [
    /(\d{1,2})\s*[：:]\s*(\d{2})/,
    /出生时间[：:]\s*(\d{1,2})[：:时\s]/,
    /(\d{1,2})\s*时/,
  ];
  for (const p of timePatterns) {
    const match = text.match(p);
    if (match) { h = parseInt(match[1]); break; }
  }

  // 性别：精确匹配，防止子女宫等干扰
  let gender = '男';
  const gMatch = text.match(/性别[：:\s]*(男|女)/);
  if (gMatch) {
    gender = gMatch[1];
  } else if (text.includes('坤造')) {
    gender = '女';
  } else if (text.includes('乾造')) {
    gender = '男';
  }
  console.log('[DEBUG] 性别匹配结果:', gender, '| 原始片段:', text.substring(text.indexOf('性别'), text.indexOf('性别') + 20));

  return { year: y, month: m, day: d, hour: h, gender: gender };
}

function enterChat(birth) {
  document.getElementById('loadingPage').style.display = 'none';
  document.getElementById('chatPage').style.display = 'flex';

  const g = birth.gender === '男' ? '乾造' : '坤造';
  document.getElementById('chatInfo').innerHTML =
    g + ' · <strong>' + birth.year + '年' + birth.month + '月' + birth.day + '日 ' + birth.hour + '时</strong> · 命理师在线';

  chatHistory = [];
  addBotMsg('善信慈悲。贫道已观善信命盘，心中已有分晓。请赐问，贫道当为善信详解。', true);
}

// ── 对话 ──
function ask(q) {
  document.getElementById('chatInput').value = q;
  sendMsg();
}

async function sendMsg(q) {
  if (isThinking) return;
  const input = document.getElementById('chatInput');
  const text = q || input.value.trim();
  if (!text) return;
  input.value = '';

  addUserMsg(text);
  addThinkingMsg();

  isThinking = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const resp = await fetch(API + '/api/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chartData: chartData,
        messages: [{ role: 'user', content: text }],
        sessionId: sessionId
      })
    });

    if (resp.status === 402) {
      // 余额不足
      const err = await resp.json();
      hideThinkingMsg();
      addBotMsg(err.message || '💎 3次免费额度已用完，请充值（¥1/句）。');
      freeMsgsRemaining = 0;
      localStorage.setItem('zw_freeMsgs', 0);
      updateCreditDisplay();
      // 弹充值窗
      setTimeout(showRecharge, 800);
    } else if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || '服务异常');
    } else {
      const data = await resp.json();
      hideThinkingMsg();
      addBotMsg(data.reply);
      // 更新余额和计费信息
      if (data.billing) {
        sessionCredits = data.billing.remaining;
        freeMsgsRemaining = data.billing.freeMsgsRemaining ?? 0;
        localStorage.setItem('zw_sessionCredits', sessionCredits);
        localStorage.setItem('zw_freeMsgs', freeMsgsRemaining);
        if (data.billing.charged > 0) {
          const bmsg = '📊 ' + (data.billing.free||0) + '句免费 + ' + (data.billing.charged||0) + '句收费¥' + (data.billing.charged||0) + '（剩余免费' + freeMsgsRemaining + '次，余额' + sessionCredits + '句）';
          addBillingMsg(bmsg);
        } else if (data.billing.free > 0) {
          addBillingMsg('🎁 免费提问（还剩' + freeMsgsRemaining + '次免费）');
        }
        updateCreditDisplay();
      }
    }
  } catch (err) {
    hideThinkingMsg();
    addBotMsg('抱歉，服务暂不可用——' + err.message + '。请稍后再试。');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  scrollBottom();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  document.getElementById('chatMessages').appendChild(d);
  scrollBottom();
}

function addBillingMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg billing';
  d.textContent = text;
  document.getElementById('chatMessages').appendChild(d);
  scrollBottom();
}

function addBotMsg(html) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  document.getElementById('chatMessages').appendChild(d);
  scrollBottom();
}

function addThinkingMsg() {
  const d = document.createElement('div');
  d.className = 'msg thinking';
  d.id = 'thinkingMsg';
  d.textContent = '命理师正在推演天机...';
  document.getElementById('chatMessages').appendChild(d);
  scrollBottom();
}

function hideThinkingMsg() {
  const e = document.getElementById('thinkingMsg');
  if (e) e.remove();
}

function scrollBottom() {
  const m = document.getElementById('chatMessages');
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}

function resetPage() {
  chartData = null;
  chatHistory = [];
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('uploadPage').style.display = 'flex';
  fileInput.value = '';
}

// ☁️ 云上传——将命盘上传至小程序
async function cloudUpload() {
  const btn = document.getElementById('cloudBtn');
  const toast = document.getElementById('cloudToast');
  btn.disabled = true;
  btn.textContent = '⏳';
  toast.style.opacity = '1';
  toast.textContent = '正在上传命盘...';
  try {
    const r = await fetch(API + '/api/cloud-upload', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chartData })
    });
    const d = await r.json();
    if (d.message) {
      addBotMsg('☁️ ' + d.message);
      toast.textContent = '上传成功！可在小程序查看';
      setTimeout(()=>{toast.style.opacity='0';}, 2500);
    } else {
      toast.textContent = '上传失败：' + (d.error||'未知错误');
      setTimeout(()=>{toast.style.opacity='0';}, 2500);
    }
  } catch(e) {
    toast.textContent = '网络错误，请重试';
    setTimeout(()=>{toast.style.opacity='0';}, 2500);
  }
  btn.disabled = false;
  btn.textContent = '☁️';
}
</script>
